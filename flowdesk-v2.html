.header h1{font-size:24px;margin-bottom:6px}
.header .date{opacity:.85;font-size:13px}
.progress-section{padding:20px 24px;background:#f8f9fa}
.progress-bar{background:#e9ecef;height:28px;border-radius:14px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;border-radius:14px;transition:width .3s}
.stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.stat{flex:1;min-width:70px;text-align:center;padding:10px 6px;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stat-val{font-size:28px;font-weight:700;line-height:1.1}
.stat-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.section{padding:16px 24px}
.section-title{font-size:14px;font-weight:700;color:#667eea;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #eee}
.alert-box{background:#fff5f5;border:1px solid #feb2b2;border-radius:10px;padding:12px 16px;margin-bottom:8px}
.alert-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #fed7d7}
.alert-item:last-child{border:none}
.alert-name{font-size:13px;font-weight:500;color:#c53030}
.alert-reason{font-size:11px;color:#e53e3e;background:#fff;padding:2px 8px;border-radius:10px}
.next-box{background:#f0fff4;border:1px solid #c6f6d5;border-radius:10px;padding:12px 16px;margin-bottom:8px}
.next-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #e2e8f0}
.next-item:last-child{border:none}
.next-name{font-size:13px;font-weight:500;color:#2d3748}
.next-meta{font-size:11px;color:#718096}
.obj{margin-bottom:12px;border-radius:10px;overflow:hidden;border:1px solid #e2e8f0}
.obj-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer}
.obj-header.completed{background:#f0fff4;border-left:4px solid #48bb78}
.obj-header.in-progress{background:#fffff0;border-left:4px solid #ecc94b}
.obj-header.waiting{background:#fffaf0;border-left:4px solid #ed8936}
.obj-header.pending{background:#f7fafc;border-left:4px solid #cbd5e0}
.obj-name{font-size:15px;font-weight:600;color:#2d3748;flex:1}
.obj-meta{font-size:12px;color:#718096;margin-top:2px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-completed{background:#c6f6d5;color:#22543d}
.badge-in-progress{background:#fefcbf;color:#744210}
.badge-waiting{background:#feebc8;color:#7b341e}
.badge-pending{background:#edf2f7;color:#4a5568}
.obj-body{padding:8px 16px 12px;background:#fff}
.task{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin:4px 0;background:#f7fafc;border-radius:6px;border-left:3px solid #cbd5e0}
.task.task-completed{border-left-color:#48bb78;opacity:.7}
.task.task-in-progress{border-left-color:#ecc94b}
.task.task-waiting{border-left-color:#ed8936}
.task-name{font-size:13px;color:#4a5568}
.task-info{font-size:11px;color:#a0aec0;margin-top:2px}
.notes{background:#fffbeb;border-left:3px solid #fbbf24;padding:8px 12px;margin:6px 0;border-radius:4px;font-size:13px;color:#78350f}
.obj-progress{width:100%;background:#e2e8f0;height:6px;border-radius:3px;margin-top:6px}
.obj-progress-fill{height:100%;border-radius:3px;transition:width .3s}
.footer{text-align:center;padding:16px;background:#f8f9fa;color:#999;font-size:12px}
.no-attention{text-align:center;padding:16px;color:#48bb78;font-size:14px}
@media print{body{background:#fff;padding:0}.container{box-shadow:none}}`;

    const progressColor = progress === 100 ? '#48bb78' : progress >= 50 ? '#ecc94b' : '#667eea';

    let attentionHtml = '';
    if (attentionItems.length > 0) {
      attentionHtml = `<div class="alert-box">${attentionItems.map(a => `<div class="alert-item"><span class="alert-name">⚠️ ${a.name}</span><span class="alert-reason">${a.reason}</span></div>`).join('')}</div>`;
    } else {
      attentionHtml = `<div class="no-attention">✅ No hay elementos que requieran atención urgente</div>`;
    }

    let nextHtml = '';
    if (nextSteps.length > 0) {
      nextHtml = `<div class="next-box">${nextSteps.map(n => `<div class="next-item"><div><span class="next-name">→ ${n.name}</span><div class="next-meta">Responsable: ${n.responsible}${n.due ? ' · 📅 ' + new Date(n.due).toLocaleDateString('es-ES',{day:'2-digit',month:'short'}) : ''}</div></div></div>`).join('')}</div>`;
    }

    const objectivesHtml = objectives.map((obj, i) => {
      const prog = getObjectiveProgress(obj);
      const pct = prog.total > 0 ? Math.round((prog.completed / prog.total) * 100) : 0;
      const isComplete = pct === 100 || obj.status === 'completed';
      const statusClass = obj.status;
      const fillColor = isComplete ? '#48bb78' : pct >= 50 ? '#ecc94b' : '#cbd5e0';

      const dueDateStr = obj.dueDate ? ' · 📅 ' + new Date(obj.dueDate).toLocaleDateString('es-ES',{day:'2-digit',month:'short'}) : '';
      const responsibleStr = obj.assignedTo ? ' · ' + obj.assignedTo.name : '';

      // Completed objectives: collapsed (no task detail)
      if (isComplete) {
        return `<div class="obj"><div class="obj-header completed"><div><span class="obj-name">${i+1}. ${obj.name}</span><div class="obj-meta">${prog.completed}/${prog.total} tareas completadas${responsibleStr}${dueDateStr}</div></div><span class="badge badge-completed">✅ Completado</span></div></div>`;
      }

      // Non-completed: show tasks
      const tasksHtml = (obj.subObjectives||[]).map((sub, j) => {
        const subDue = sub.dueDate ? ' · 📅 ' + new Date(sub.dueDate).toLocaleDateString('es-ES',{day:'2-digit',month:'short'}) : '';
        const subResp = sub.assignedTo ? sub.assignedTo.name : '';
        return `<div class="task task-${sub.status}"><div><span class="task-name">${i+1}.${j+1} ${sub.name}</span><div class="task-info">${subResp}${subDue}</div></div><span class="badge badge-${sub.status}">${getStatusText(sub.status)}</span></div>`;
      }).join('');

      const notesHtml = obj.notes ? `<div class="notes">📝 ${obj.notes}</div>` : '';

      return `<div class="obj"><div class="obj-header ${statusClass}"><div><span class="obj-name">${i+1}. ${obj.name}</span><div class="obj-meta">${prog.completed}/${prog.total} tareas${responsibleStr}${dueDateStr}</div><div class="obj-progress"><div class="obj-progress-fill" style="width:${pct}%;background:${fillColor}"></div></div></div><span class="badge badge-${obj.status}">${getStatusText(obj.status)}</span></div><div class="obj-body">${notesHtml}${tasksHtml}</div></div>`;
    }).join('');

    const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Reporte: ${project.name}</title><style>${css}</style></head><body><div class="container">
<div class="header"><h1>${project.name}</h1><p class="date">Reporte generado el ${new Date().toLocaleDateString('es-ES',{year:'numeric',month:'long',day:'numeric'})}</p></div>
<div class="progress-section"><div class="progress-bar"><div class="progress-fill" style="width:${Math.max(progress,8)}%;background:${progressColor}">${progress}% Completado</div></div><div class="stats"><div class="stat"><div class="stat-val" style="color:#48bb78">${completedObj}</div><div class="stat-label">Completados</div></div><div class="stat"><div class="stat-val" style="color:#ecc94b">${inProgressObj}</div><div class="stat-label">En progreso</div></div><div class="stat"><div class="stat-val" style="color:#ed8936">${waitingObj}</div><div class="stat-label">En espera</div></div><div class="stat"><div class="stat-val" style="color:#a0aec0">${pendingObj}</div><div class="stat-label">Pendientes</div></div></div></div>
<div class="section"><div class="section-title">⚡ Requiere tu atención</div>${attentionHtml}</div>
<div class="section"><div class="section-title">→ Próximos pasos</div>${nextHtml}</div>
<div class="section"><div class="section-title">📋 Detalle por objetivo</div>${objectivesHtml}</div>
<div class="footer">© ${new Date().getFullYear()} - Flowdesk</div>
</div></body></html>`;

    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Reporte_${project.name.replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // ==================== RENDER ====================
  
  // Loading state
  if (authLoading) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center">
        <div className="text-center">
          <div className="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
          <p className="text-gray-600">Cargando...</p>
        </div>
      </div>
    );
  }

  // Role selection for new Google users
  if (showRoleSelect && pendingGoogleUser) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
        <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
          <div className="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <Users size={40} className="text-white" />
          </div>
          <h2 className="text-xl font-bold text-gray-800 mb-2">¡Bienvenido/a!</h2>
          <p className="text-gray-500 mb-6">{pendingGoogleUser.displayName}, ¿cuál es tu rol?</p>
          <div className="grid grid-cols-2 gap-3">
            <button onClick={() => completeRoleSelection('team')} className="p-4 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 transition-all">
              <div className="text-3xl mb-2">🛠️</div>
              <p className="font-semibold">Equipo</p>
            </button>
            <button onClick={() => completeRoleSelection('client')} className="p-4 rounded-xl border-2 border-green-500 bg-green-50 text-green-700 hover:bg-green-100 transition-all">
              <div className="text-3xl mb-2">👁️</div>
              <p className="font-semibold">Cliente</p>
            </button>
          </div>
        </div>
      </div>
    );
  }

  // Login screen
  if (!currentUser) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
        <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
          <div className="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <Users size={40} className="text-white" />
          </div>
          <h1 className="text-3xl font-bold text-gray-800 mb-1">Flowdesk</h1>
          <p className="text-indigo-500 font-medium text-sm mb-1">Gestión de proyectos simple y colaborativa</p>
          <p className="text-gray-500 text-sm mb-8">Iniciá sesión para continuar</p>
          <button
            onClick={handleGoogleLogin}
            className="w-full py-3 px-6 bg-white border-2 border-gray-300 rounded-lg font-semibold text-gray-700 hover:bg-gray-50 hover:border-gray-400 transition-all flex items-center justify-center gap-3"
          >
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
            Continuar con Google
          </button>
        </div>
      </div>
    );
  }

  const filteredProjects = getFilteredProjects();

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 pb-20">
      {/* Confirm Dialog */}
      {confirmDialog && (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-xl p-6 max-w-sm w-full shadow-2xl">
            <p className="text-gray-800 font-medium mb-4">{confirmDialog.message}</p>
            <div className="flex gap-3">
              <button onClick={confirmDialog.onConfirm} className="flex-1 bg-red-600 text-white py-2 rounded-lg font-medium">Sí, eliminar</button>
              <button onClick={() => setConfirmDialog(null)} className="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg font-medium">Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* Save error toast */}
      {saveError && (
        <div className="fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-lg shadow-lg z-50 text-sm font-medium">
          ⚠️ {saveError}
        </div>
      )}

      {/* Header */}
      <div className="bg-white shadow-sm sticky top-0 z-10">
        <div className="max-w-4xl mx-auto px-4 py-4">
          <div className="flex items-center justify-between mb-3">
            <div>
              <h1 className="text-2xl font-bold text-gray-800">Flowdesk</h1>
              <p className="text-sm text-gray-600">👤 {currentUser.name}
                <span className={`ml-2 text-xs px-2 py-0.5 rounded-full ${firebaseStatus === 'connected' ? 'bg-green-100 text-green-600' : 'bg-yellow-100 text-yellow-600'}`}>
                  {firebaseStatus === 'connected' ? '🟢 Live' : '⏳ Conectando'}
                </span>
              </p>
            </div>
            <div className="flex items-center gap-2">
              {currentUser?.role !== 'client' && (() => {
                const notifs = getNotifications();
                const unseen = notifs.filter(n => !seenNotifications.includes(n.id)).length;
                return (
                  <button onClick={() => setShowNotifications(!showNotifications)} className={`relative p-3 rounded-full ${showNotifications ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-200 text-gray-700'} hover:bg-indigo-100`}>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    {unseen > 0 && <span className="absolute top-1.5 right-1.5 w-4 h-4 bg-red-500 rounded-full text-white text-xs flex items-center justify-center font-bold">{unseen > 9 ? '9+' : unseen}</span>}
                  </button>
                );
              })()}
              {currentUser?.role !== 'client' && (
                <button onClick={() => setShowTeamPanel(!showTeamPanel)} className={`p-3 rounded-full ${showTeamPanel ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-200 text-gray-700'} hover:bg-indigo-100`}>
                  <Users size={24} />
                </button>
              )}
              <button onClick={handleLogout} className="p-3 rounded-full bg-gray-200 text-gray-700 hover:bg-gray-300" title="Cerrar sesión"><X size={24} /></button>
            </div>
          </div>
          
          {currentUser?.role !== 'client' && (
            <div className="flex gap-2 mb-2">
              <button onClick={() => setViewMode('work')} className={`flex-1 py-2 px-4 rounded-lg font-medium ${effectiveViewMode === 'work' ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'}`}>
                <Edit2 size={16} className="inline mr-1" />Modo Trabajo
              </button>
              <button onClick={() => setViewMode('client')} className={`flex-1 py-2 px-4 rounded-lg font-medium ${effectiveViewMode === 'client' ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-700'}`}>
                <Eye size={16} className="inline mr-1" />Vista Cliente
              </button>
            </div>
          )}
          {currentUser?.role === 'client' && (
            <div className="flex items-center justify-center py-2 px-4 bg-green-50 rounded-lg mb-2">
              <Eye size={16} className="inline mr-2 text-green-600" />
              <span className="text-sm font-medium text-green-700">Vista Cliente</span>
            </div>
          )}

          {effectiveViewMode === 'work' && (
            <div className="flex gap-2">
              <button onClick={() => setFilterMode('all')} className={`flex-1 py-2 px-3 rounded-lg text-sm font-medium ${filterMode === 'all' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-600'}`}>
                <Filter size={14} className="inline mr-1" />Todas
              </button>
              <button onClick={() => setFilterMode('my-tasks')} className={`flex-1 py-2 px-3 rounded-lg text-sm font-medium ${filterMode === 'my-tasks' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-600'}`}>
                <User size={14} className="inline mr-1" />Mis Tareas
              </button>
            </div>
          )}
        </div>
      </div>

      <div className="max-w-4xl mx-auto px-4 py-6">
        {/* Notifications panel */}
        {showNotifications && currentUser?.role !== 'client' && (() => {
          const notifs = getNotifications();
          return (
            <div className="mb-4 bg-white rounded-lg shadow-md overflow-hidden">
              <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-4 text-white flex items-center justify-between">
                <h3 className="font-bold">🔔 Novedades</h3>
                <button onClick={() => setShowNotifications(false)} className="p-1 hover:bg-white hover:bg-opacity-20 rounded"><X size={18} /></button>
              </div>
              <div className="p-4">
                {notifs.length === 0 ? (
                  <p className="text-sm text-gray-500 text-center py-4">✨ Todo al día</p>
                ) : (
                  <div>
                    {notifs.some(n => !seenNotifications.includes(n.id)) && (
                      <button onClick={markAllSeen} className="w-full text-xs text-indigo-500 text-right mb-2 font-medium">Marcar todas como vistas</button>
                    )}
                    <div className="space-y-2">
                      {notifs.map(n => (
                        <div key={n.id} onClick={() => markNotificationSeen(n.id)} className={`p-3 rounded-lg border-l-4 cursor-pointer ${seenNotifications.includes(n.id) ? 'opacity-40' : ''} ${n.type === 'approval' ? 'bg-green-50 border-green-400' : 'bg-blue-50 border-blue-400'}`}>
                          <p className="text-xs font-semibold text-gray-400 uppercase">{n.projectName}</p>
                          <p className="text-sm font-medium text-gray-800">{n.text}</p>
                          {n.detail && <p className="text-xs text-gray-500 mt-0.5 italic">"{n.detail}"</p>}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        })()}

        {/* Team panel */}
        {showTeamPanel && (
          <div className="mb-4 bg-white rounded-lg shadow-md overflow-hidden">
            <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-4 text-white flex items-center justify-between">
              <h3 className="font-bold"><Users size={20} className="inline mr-2" />Equipo</h3>
              <button onClick={() => setShowTeamPanel(false)} className="p-1 hover:bg-white hover:bg-opacity-20 rounded"><X size={18} /></button>
            </div>
            <div className="p-4">
              {getAssignableMembers().map(member => (
                <div key={member.id || member.email} className="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
                  <div>
                    <p className="text-sm font-medium text-gray-800">{member.name}</p>
                    <p className="text-xs text-gray-400">{member.email}</p>
                  </div>
                  <div className="flex items-center gap-2">
                    {member.email === currentUser.email && <span className="text-xs bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full">Vos</span>}
                    <span className={`text-xs px-2 py-0.5 rounded-full ${member.role === 'client' ? 'bg-green-100 text-green-600' : 'bg-indigo-100 text-indigo-600'}`}>
                      {member.role === 'client' ? '👁️ Cliente' : '🛠️ Equipo'}
                    </span>
                    {member.email !== currentUser.email && (
                      <button onClick={() => removeMember(member.id)} className="p-1 text-red-400 hover:text-red-600"><X size={14} /></button>
                    )}
                  </div>
                </div>
              ))}
              <div className="border-t pt-3 mt-3">
                <p className="text-xs font-semibold text-gray-500 uppercase mb-2">Agregar miembro</p>
                <input type="text" value={newMemberName} onChange={e => setNewMemberName(e.target.value)} placeholder="Nombre" className="w-full p-2 border border-gray-300 rounded-lg mb-2 text-sm" />
                <input type="email" value={newMemberEmail} onChange={e => setNewMemberEmail(e.target.value)} placeholder="Email" className="w-full p-2 border border-gray-300 rounded-lg mb-2 text-sm" />
                <div className="grid grid-cols-2 gap-2 mb-2">
                  <button onClick={() => setNewMemberRole('team')} className={`p-2 rounded-lg border-2 text-xs font-medium ${newMemberRole === 'team' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 text-gray-500'}`}>🛠️ Equipo</button>
                  <button onClick={() => setNewMemberRole('client')} className={`p-2 rounded-lg border-2 text-xs font-medium ${newMemberRole === 'client' ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-200 text-gray-500'}`}>👁️ Cliente</button>
                </div>
                <button onClick={addManualMember} className="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-indigo-700">
                  <Plus size={14} className="inline mr-1" />Agregar al equipo
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Add project button */}
        {effectiveViewMode === 'work' && !showAddProject && (
          <button onClick={() => setShowAddProject(true)} className="w-full mb-4 py-3 border-2 border-dashed border-indigo-300 rounded-lg text-indigo-600 font-medium hover:bg-indigo-50">
            <Plus size={20} className="inline mr-2" />Nuevo Proyecto
          </button>
        )}

        {showAddProject && (
          <div className="mb-4 bg-white p-4 rounded-lg shadow">
            <input type="text" value={newProjectName} onChange={e => setNewProjectName(e.target.value)} placeholder="Nombre del proyecto..." className="w-full p-3 border border-gray-300 rounded-lg mb-2" autoFocus />
            <div className="flex gap-2">
              <button onClick={addProject} className="flex-1 bg-indigo-600 text-white py-2 rounded-lg"><Check size={18} className="inline mr-1" />Crear</button>
              <button onClick={() => setShowAddProject(false)} className="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg"><X size={18} className="inline mr-1" />Cancelar</button>
            </div>
          </div>
        )}

        {/* Projects */}
        {filteredProjects.map(project => {
          const progress = calculateProgress(project.objectives);
          const totalTasks = (project.objectives||[]).reduce((acc, obj) => acc + ((obj.subObjectives||[]).length || 1), 0);
          const completedTasks = (project.objectives||[]).reduce((acc, obj) => {
            if (!obj.subObjectives || obj.subObjectives.length === 0) return acc + (obj.status === 'completed' ? 1 : 0);
            return acc + obj.subObjectives.filter(s => s.status === 'completed').length;
          }, 0);
          const inProgressTasks = (project.objectives||[]).reduce((acc, obj) => {
            if (!obj.subObjectives || obj.subObjectives.length === 0) return acc + (obj.status === 'in-progress' ? 1 : 0);
            return acc + (obj.subObjectives||[]).filter(s => s.status === 'in-progress').length;
          }, 0);
          const progressColor = progress === 100 ? 'bg-green-400' : progress >= 50 ? 'bg-yellow-400' : 'bg-white bg-opacity-80';
          
          return (
            <div key={project.id} className="mb-4 bg-white rounded-lg shadow-md overflow-hidden">
              <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-4 text-white">
                <div className="flex items-center justify-between">
                  <div className="flex-1">
                    <h2 className="text-xl font-bold mb-1">{project.name}</h2>
                    <div className="flex items-center gap-3 mb-1">
                      <div className="flex-1 bg-white bg-opacity-30 rounded-full h-2.5">
                        <div className={`${progressColor} h-2.5 rounded-full transition-all`} style={{ width: `${progress}%` }} />
                      </div>
                      <span className="text-sm font-semibold">{progress}%</span>
                    </div>
                    <p className="text-xs text-white text-opacity-80">
                      ✅ {completedTasks}/{totalTasks} completadas
                      {inProgressTasks > 0 && ` · 🔄 ${inProgressTasks} en progreso`}
                      {progress === 100 && ' · 🎉 ¡Proyecto completo!'}
                    </p>
                  </div>
                  <div className="flex items-center gap-2 ml-4">
                    {effectiveViewMode === 'client' && (
                      <button onClick={() => downloadReport(project)} className="p-2 hover:bg-white hover:bg-opacity-20 rounded" title="Descargar reporte"><Download size={18} /></button>
                    )}
                    {effectiveViewMode === 'work' && isProjectAdmin(project) && (
                      <button onClick={() => setManagingAccessFor(managingAccessFor === project.id ? null : project.id)} className="p-2 hover:bg-white hover:bg-opacity-20 rounded" title="Gestionar acceso">👥</button>
                    )}
                    {effectiveViewMode === 'work' && isProjectAdmin(project) && (
                      <button onClick={() => handleDeleteItem(project.id)} className="p-2 hover:bg-white hover:bg-opacity-20 rounded"><Trash2 size={18} /></button>
                    )}
                    <button onClick={() => setExpandedProjects(prev => ({...prev, [project.id]: !prev[project.id]}))} className="p-2 hover:bg-white hover:bg-opacity-20 rounded">
                      {expandedProjects[project.id] ? <ChevronDown size={24} /> : <ChevronRight size={24} />}
                    </button>
                  </div>
                </div>
              </div>

              {expandedProjects[project.id] && (
                <div className="p-4">
                  {/* Access management */}
                  {managingAccessFor === project.id && isProjectAdmin(project) && (
                    <div className="mb-4 bg-indigo-50 rounded-lg p-3 border border-indigo-200">
                      <p className="text-xs font-semibold text-indigo-700 uppercase mb-2">👥 Acceso al proyecto</p>
                      {getAssignableMembers().filter(m => m.email !== currentUser.email).map(member => {
                        const hasAccess = (project.allowedMembers||[]).includes(member.email);
                        return (
                          <div key={member.id || member.email} className="flex items-center justify-between py-1.5 border-b border-indigo-100 last:border-0">
                            <div>
                              <p className="text-sm font-medium text-gray-700">{member.name}</p>
                              <p className="text-xs text-gray-400">{member.role === 'client' ? '👁️ Cliente' : '🛠️ Equipo'}</p>
                            </div>
                            <button onClick={() => toggleProjectAccess(project.id, member.email)} className={`px-3 py-1 rounded-full text-xs font-medium ${hasAccess ? 'bg-indigo-600 text-white' : 'bg-white border border-gray-300 text-gray-500'}`}>
                              {hasAccess ? '✅ Puede verlo' : '🔒 Sin acceso'}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {/* Objectives */}
                  {(project.objectives||[]).map(objective => {
                    const objProg = getObjectiveProgress(objective);
                    const objProgPct = objProg.total > 0 ? Math.round((objProg.completed / objProg.total) * 100) : 0;
                    const objProgColor = objProgPct === 100 ? 'bg-green-500 text-white' : objProgPct >= 50 ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-600';
                    
                    return (
                    <div key={objective.id} className="mb-4 border-l-4 border-indigo-300 pl-4">
                      <div className="flex items-start justify-between mb-2">
                        <div className="flex-1">
                          <div className="flex items-center gap-2 flex-wrap mb-1">
                            <h3 className="font-semibold text-gray-800">{objective.name}</h3>
                            {(objective.subObjectives||[]).length > 0 && (
                              <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${objProgColor}`}>
                                {objProg.completed}/{objProg.total} tareas
                              </span>
                            )}
                            {objective.assignedTo && (
                              <span className="text-xs bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full">
                                <User size={10} className="inline mr-0.5" />{objective.assignedTo.name}
                              </span>
                            )}
                          </div>

                          {effectiveViewMode === 'work' && (
                            <>
                              <div className="flex gap-2 flex-wrap mb-2">
                                {['pending','in-progress','waiting','completed'].map(s => (
                                  <button key={s} onClick={() => updateStatus(project.id, objective.id, null, s)} className={`px-3 py-1 rounded text-xs ${objective.status === s ? getStatusColor(s)+' text-white' : 'bg-gray-200'}`}>{getStatusText(s)}</button>
                                ))}
                                <button onClick={() => setAssigningTo(assigningTo === `obj-${objective.id}` ? null : `obj-${objective.id}`)} className="px-3 py-1 rounded text-xs bg-blue-100 text-blue-700"><User size={12} className="inline mr-1" />Asignar</button>
                              </div>
                              {(() => {
                                const ds = getDueDateStatus(objective.dueDate, objective.status);
                                return (
                                  <div className="flex items-center gap-2 mb-2 flex-wrap">
                                    <label className="text-xs text-gray-400 flex items-center gap-1">📅 <input type="date" value={objective.dueDate||''} onChange={e => updateDueDate(project.id, objective.id, null, e.target.value||null)} className="text-xs border border-gray-200 rounded px-1 py-0.5" /></label>
                                    {ds && <span className={`text-xs px-2 py-0.5 rounded-full border font-medium ${ds.color}`}>{ds.label}</span>}
                                    {objective.dueDate && <button onClick={() => updateDueDate(project.id, objective.id, null, null)} className="text-xs text-gray-300 hover:text-red-400">✕</button>}
                                  </div>
                                );
                              })()}
                            </>
                          )}

                          {assigningTo === `obj-${objective.id}` && (
                            <div className="mt-2 mb-2 bg-blue-50 p-3 rounded">
                              <p className="text-sm font-medium mb-2">Asignar a:</p>
                              <div className="flex flex-wrap gap-2">
                                {getAssignableMembers().map(m => <button key={m.id||m.email} onClick={() => assignTask(project.id, objective.id, null, m)} className="px-3 py-1 bg-white border rounded text-sm">{m.name}</button>)}
                                <button onClick={() => assignTask(project.id, objective.id, null, null)} className="px-3 py-1 bg-white border rounded text-sm">Sin asignar</button>
                              </div>
                            </div>
                          )}

                          {effectiveViewMode === 'client' && (
                            <div className="space-y-2">
                              <div className="flex items-center gap-2 flex-wrap mb-1">
                                <span className={`inline-block px-3 py-1 rounded-full text-xs text-white ${getStatusColor(objective.status)}`}>{getStatusText(objective.status)}</span>
                                {objective.assignedTo && <span className="text-xs text-gray-500"><User size={12} className="inline" /> {objective.assignedTo.name}</span>}
                                {objective.dueDate && <span className="text-xs text-gray-400">📅 {new Date(objective.dueDate).toLocaleDateString('es-ES',{day:'2-digit',month:'short'})}</span>}
                              </div>
                              {(objective.subObjectives||[]).length > 0 && (
                                <div className="w-full bg-gray-200 rounded-full h-1.5 mt-1">
                                  <div className={`h-1.5 rounded-full transition-all ${objProgPct === 100 ? 'bg-green-500' : objProgPct >= 50 ? 'bg-yellow-500' : 'bg-gray-400'}`} style={{width:`${objProgPct}%`}} />
                                </div>
                              )}
                              {objective.status === 'waiting' && (
                                <button onClick={() => approveTask(project.id, objective.id)} className="px-3 py-1 bg-green-500 text-white text-xs rounded-full font-medium hover:bg-green-600">✅ Aprobar</button>
                              )}
                              {renderCommentDisplay(objective.clientComment)}
                              {editingClientComment === `obj-${objective.id}` ? (
                                <div className="mt-2 bg-blue-50 p-2 rounded border border-blue-200">
                                  <textarea value={clientComment} onChange={e => setClientComment(e.target.value)} placeholder="Dejá un comentario..." className="w-full p-2 border rounded text-xs mb-2" rows="2" autoFocus />
                                  <div className="flex gap-2">
                                    <button onClick={() => saveClientComment(project.id, objective.id, null, clientComment)} className="flex-1 bg-blue-600 text-white py-1 rounded text-xs"><Check size={12} className="inline mr-1" />Guardar</button>
                                    <button onClick={() => { setEditingClientComment(null); setClientComment(''); }} className="flex-1 bg-gray-300 text-gray-700 py-1 rounded text-xs"><X size={12} className="inline mr-1" />Cancelar</button>
                                  </div>
                                </div>
                              ) : (
                                <button onClick={() => { setEditingClientComment(`obj-${objective.id}`); setClientComment(typeof objective.clientComment === 'object' ? objective.clientComment?.text || '' : objective.clientComment || ''); }} className="text-xs text-blue-500 hover:text-blue-700">
                                  💬 {objective.clientComment ? 'Editar comentario' : 'Dejar comentario'}
                                </button>
                              )}
                            </div>
                          )}

                          {/* Comment in work mode (read-only) */}
                          {effectiveViewMode === 'work' && renderCommentDisplay(objective.clientComment, true)}

                          {/* Notes */}
                          {objective.notes && (
                            <div className="mt-3 bg-yellow-50 p-3 rounded border-l-2 border-yellow-400">
                              <p className="text-sm font-medium text-yellow-800 mb-1">📝 Informe:</p>
                              <p className="text-sm text-gray-700 whitespace-pre-wrap">{objective.notes}</p>
                            </div>
                          )}

                          {/* Files */}
                          {objective.files && objective.files.length > 0 && (
                            <div className="mt-3 space-y-2">
                              {objective.files.map(file => renderFile(file, project.id, objective.id, null))}
                            </div>
                          )}

                          {/* Work mode actions */}
                          {effectiveViewMode === 'work' && editingNotes !== `obj-${objective.id}` && (
                            <div className="flex gap-2 mt-3">
                              <button onClick={() => { setEditingNotes(`obj-${objective.id}`); setNoteText(objective.notes||''); }} className="text-xs px-3 py-1.5 bg-yellow-100 text-yellow-700 rounded"><FileText size={14} className="inline mr-1" />{objective.notes ? 'Editar Informe' : 'Agregar Informe'}</button>
                              <button onClick={() => setAddingLinkTo(addingLinkTo===`obj-${objective.id}`?null:`obj-${objective.id}`)} className="text-xs px-3 py-1.5 bg-blue-100 text-blue-700 rounded"><Paperclip size={14} className="inline mr-1" />Adjuntar Link</button>
                            </div>
                          )}
                          {effectiveViewMode === 'work' && renderAddLinkPanel(project.id, objective.id, null)}

                          {effectiveViewMode === 'work' && editingNotes === `obj-${objective.id}` && (
                            <div className="mt-3 bg-yellow-50 p-3 rounded border-2 border-yellow-300">
                              <textarea value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="Escribe tu informe aquí..." className="w-full p-2 border rounded mb-2 text-sm" rows="4" autoFocus />
                              <div className="flex gap-2">
                                <button onClick={() => updateNotes(project.id, objective.id, null, noteText)} className="flex-1 bg-yellow-600 text-white py-2 rounded text-sm"><Check size={14} className="inline mr-1" />Guardar</button>
                                <button onClick={() => { setEditingNotes(null); setNoteText(''); }} className="flex-1 bg-gray-400 text-white py-2 rounded text-sm"><X size={14} className="inline mr-1" />Cancelar</button>
                              </div>
                            </div>
                          )}

                          {/* Sub-objectives (Tasks) */}
                          {(objective.subObjectives||[]).length > 0 && (
                            <div className="mt-3">
                              <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Tareas</p>
                              {objective.subObjectives.map(sub => (
                                <div key={sub.id} className="ml-4 mt-2 bg-gray-50 p-3 rounded">
                                  <div className="flex items-start justify-between">
                                    <div className="flex-1">
                                      <div className="flex items-center gap-2 mb-1 flex-wrap">
                                        <p className="text-sm font-medium">{sub.name}</p>
                                        {sub.assignedTo && (
                                          <span className="text-xs bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full">
                                            <User size={10} className="inline mr-0.5" />{sub.assignedTo.name}
                                          </span>
                                        )}
                                        {sub.requiresPrevious && !isPreviousCompleted(objective, sub.id) && <span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">🔒 Bloqueada</span>}
                                      </div>

                                      {effectiveViewMode === 'work' && (
                                        <>
                                          <div className="flex gap-2 flex-wrap mb-2">
                                            {['pending','in-progress','waiting','completed'].map(s => (
                                              <button key={s} onClick={() => updateStatus(project.id, objective.id, sub.id, s)} className={`px-2 py-1 rounded text-xs ${sub.status === s ? getStatusColor(s)+' text-white' : 'bg-gray-200'}`}>{getStatusText(s)}</button>
                                            ))}
                                            <button onClick={() => setAssigningTo(assigningTo === `sub-${sub.id}` ? null : `sub-${sub.id}`)} className="px-2 py-1 rounded text-xs bg-blue-100 text-blue-700"><User size={10} className="inline mr-1" />Asignar</button>
                                          </div>
                                          {(() => {
                                            const ds = getDueDateStatus(sub.dueDate, sub.status);
                                            return (
                                              <div className="flex items-center gap-2 mb-2 flex-wrap">
                                                <label className="text-xs text-gray-400 flex items-center gap-1">📅 <input type="date" value={sub.dueDate||''} onChange={e => updateDueDate(project.id, objective.id, sub.id, e.target.value||null)} className="text-xs border border-gray-200 rounded px-1 py-0.5" /></label>
                                                {ds && <span className={`text-xs px-2 py-0.5 rounded-full border font-medium ${ds.color}`}>{ds.label}</span>}
                                                {sub.dueDate && <button onClick={() => updateDueDate(project.id, objective.id, sub.id, null)} className="text-xs text-gray-300 hover:text-red-400">✕</button>}
                                              </div>
                                            );
                                          })()}
                                          {objective.subObjectives.findIndex(s => s.id === sub.id) > 0 && (
                                            <label className="flex items-center gap-2 text-xs text-gray-500 cursor-pointer mb-2 select-none">
                                              <input type="checkbox" checked={!!sub.requiresPrevious} onChange={() => toggleRequiresPrevious(project.id, objective.id, sub.id)} className="w-3 h-3 accent-orange-400" />
                                              🔒 Requiere tarea anterior
                                            </label>
                                          )}
                                        </>
                                      )}

                                      {assigningTo === `sub-${sub.id}` && (
                                        <div className="mt-2 mb-2 bg-blue-50 p-2 rounded">
                                          <p className="text-xs font-medium mb-2">Asignar a:</p>
                                          <div className="flex flex-wrap gap-1">
                                            {getAssignableMembers().map(m => <button key={m.id||m.email} onClick={() => assignTask(project.id, objective.id, sub.id, m)} className="px-2 py-1 bg-white border rounded text-xs">{m.name}</button>)}
                                            <button onClick={() => assignTask(project.id, objective.id, sub.id, null)} className="px-2 py-1 bg-white border rounded text-xs">Sin asignar</button>
                                          </div>
                                        </div>
                                      )}

                                      {effectiveViewMode === 'client' && (
                                        <div className="space-y-1">
                                          <div className="flex items-center gap-2 flex-wrap mb-1">
                                            <span className={`inline-block px-2 py-1 rounded-full text-xs text-white ${getStatusColor(sub.status)}`}>{getStatusText(sub.status)}</span>
                                            {sub.assignedTo && <span className="text-xs text-gray-500"><User size={12} className="inline" /> {sub.assignedTo.name}</span>}
                                            {sub.dueDate && <span className="text-xs text-gray-400">📅 {new Date(sub.dueDate).toLocaleDateString('es-ES',{day:'2-digit',month:'short'})}</span>}
                                          </div>
                                          {sub.status === 'waiting' && <button onClick={() => approveTask(project.id, objective.id, sub.id)} className="px-3 py-1 bg-green-500 text-white text-xs rounded-full font-medium">✅ Aprobar</button>}
                                          {renderCommentDisplay(sub.clientComment)}
                                          {editingClientComment === `sub-${sub.id}` ? (
                                            <div className="mt-1 bg-blue-50 p-2 rounded border border-blue-200">
                                              <textarea value={clientComment} onChange={e => setClientComment(e.target.value)} placeholder="Dejá un comentario..." className="w-full p-2 border rounded text-xs mb-2" rows="2" autoFocus />
                                              <div className="flex gap-2">
                                                <button onClick={() => saveClientComment(project.id, objective.id, sub.id, clientComment)} className="flex-1 bg-blue-600 text-white py-1 rounded text-xs"><Check size={12} className="inline mr-1" />Guardar</button>
                                                <button onClick={() => { setEditingClientComment(null); setClientComment(''); }} className="flex-1 bg-gray-300 text-gray-700 py-1 rounded text-xs"><X size={12} className="inline mr-1" />Cancelar</button>
                                              </div>
                                            </div>
                                          ) : (
                                            <button onClick={() => { setEditingClientComment(`sub-${sub.id}`); setClientComment(typeof sub.clientComment === 'object' ? sub.clientComment?.text||'' : sub.clientComment||''); }} className="text-xs text-blue-500">
                                              💬 {sub.clientComment ? 'Editar comentario' : 'Dejar comentario'}
                                            </button>
                                          )}
                                        </div>
                                      )}

                                      {effectiveViewMode === 'work' && renderCommentDisplay(sub.clientComment, true)}

                                      {sub.notes && (
                                        <div className="mt-2 bg-yellow-50 p-2 rounded border-l-2 border-yellow-400">
                                          <p className="text-xs font-medium text-yellow-800">📝 Informe:</p>
                                          <p className="text-xs text-gray-700 whitespace-pre-wrap">{sub.notes}</p>
                                        </div>
                                      )}

                                      {sub.files && sub.files.length > 0 && (
                                        <div className="mt-2 space-y-1">
                                          {sub.files.map(file => renderFile(file, project.id, objective.id, sub.id, true))}
                                        </div>
                                      )}

                                      {effectiveViewMode === 'work' && editingNotes !== `sub-${sub.id}` && (
                                        <div className="flex gap-2 mt-2">
                                          <button onClick={() => { setEditingNotes(`sub-${sub.id}`); setNoteText(sub.notes||''); }} className="text-xs px-2 py-1 bg-yellow-100 text-yellow-700 rounded"><FileText size={12} className="inline mr-1" />{sub.notes ? 'Editar' : 'Informe'}</button>
                                          <button onClick={() => setAddingLinkTo(addingLinkTo===`sub-${sub.id}`?null:`sub-${sub.id}`)} className="text-xs px-2 py-1 bg-blue-100 text-blue-700 rounded"><Paperclip size={12} className="inline mr-1" />Adjuntar Link</button>
                                        </div>
                                      )}
                                      {effectiveViewMode === 'work' && renderAddLinkPanel(project.id, objective.id, sub.id)}

                                      {effectiveViewMode === 'work' && editingNotes === `sub-${sub.id}` && (
                                        <div className="mt-2 bg-yellow-50 p-2 rounded border border-yellow-300">
                                          <textarea value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="Escribe tu informe..." className="w-full p-2 border rounded mb-2 text-xs" rows="3" autoFocus />
                                          <div className="flex gap-2">
                                            <button onClick={() => updateNotes(project.id, objective.id, sub.id, noteText)} className="flex-1 bg-yellow-600 text-white py-1 rounded text-xs"><Check size={12} className="inline mr-1" />Guardar</button>
                                            <button onClick={() => { setEditingNotes(null); setNoteText(''); }} className="flex-1 bg-gray-400 text-white py-1 rounded text-xs"><X size={12} className="inline mr-1" />Cancelar</button>
                                          </div>
                                        </div>
                                      )}
                                    </div>
                                    {effectiveViewMode === 'work' && (
                                      <div className="flex flex-col ml-2">
                                        <button onClick={() => moveTask(project.id, objective.id, sub.id, 'up')} disabled={objective.subObjectives.findIndex(s => s.id === sub.id) === 0} className="p-0.5 text-gray-400 hover:text-indigo-600 disabled:opacity-20">▲</button>
                                        <button onClick={() => moveTask(project.id, objective.id, sub.id, 'down')} disabled={objective.subObjectives.findIndex(s => s.id === sub.id) === objective.subObjectives.length - 1} className="p-0.5 text-gray-400 hover:text-indigo-600 disabled:opacity-20">▼</button>
                                      </div>
                                    )}
                                    {effectiveViewMode === 'work' && (
                                      <button onClick={() => handleDeleteItem(project.id, objective.id, sub.id)} className="p-1 text-red-500 ml-1"><Trash2 size={14} /></button>
                                    )}
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}

                          {/* Add task button */}
                          {effectiveViewMode === 'work' && addingSubObjectiveTo !== objective.id && (
                            <button onClick={() => setAddingSubObjectiveTo(objective.id)} className="mt-2 text-xs text-indigo-500 hover:text-indigo-700 py-1">
                              <Plus size={14} className="inline mr-1" />Agregar Tarea
                            </button>
                          )}

                          {addingSubObjectiveTo === objective.id && (
                            <div className="mt-2 bg-indigo-50 p-3 rounded">
                              <input type="text" value={newSubObjectiveName} onChange={e => setNewSubObjectiveName(e.target.value)} placeholder="Nombre de la tarea..." className="w-full p-2 border rounded mb-2 text-sm" autoFocus />
                              <div className="flex gap-2">
                                <button onClick={() => addSubObjective(project.id, objective.id, newSubObjectiveName)} className="flex-1 bg-indigo-600 text-white py-1 rounded text-sm"><Check size={14} className="inline mr-1" />Crear</button>
                                <button onClick={() => { setAddingSubObjectiveTo(null); setNewSubObjectiveName(''); }} className="flex-1 bg-gray-300 text-gray-700 py-1 rounded text-sm"><X size={14} className="inline mr-1" />Cancelar</button>
                              </div>
                            </div>
                          )}
                        </div>
                        {effectiveViewMode === 'work' && (
                          <button onClick={() => handleDeleteItem(project.id, objective.id)} className="p-1 text-red-500 ml-2 mt-1"><Trash2 size={16} /></button>
                        )}
                      </div>
                    </div>
                    );
                  })}

                  {/* Add objective button */}
                  {effectiveViewMode === 'work' && addingObjectiveTo !== project.id && (
                    <button onClick={() => setAddingObjectiveTo(project.id)} className="w-full mt-2 py-2 border-2 border-dashed border-indigo-200 rounded-lg text-indigo-500 text-sm hover:bg-indigo-50">
                      <Plus size={16} className="inline mr-1" />Agregar Objetivo
                    </button>
                  )}

                  {addingObjectiveTo === project.id && (
                    <div className="mt-2 bg-indigo-50 p-3 rounded">
                      <input type="text" value={newObjectiveName} onChange={e => setNewObjectiveName(e.target.value)} placeholder="Nombre del objetivo..." className="w-full p-2 border rounded mb-2 text-sm" autoFocus />
                      <div className="flex gap-2">
                        <button onClick={() => addObjective(project.id, newObjectiveName)} className="flex-1 bg-indigo-600 text-white py-2 rounded text-sm"><Check size={14} className="inline mr-1" />Crear</button>
                        <button onClick={() => { setAddingObjectiveTo(null); setNewObjectiveName(''); }} className="flex-1 bg-gray-300 text-gray-700 py-2 rounded text-sm"><X size={14} className="inline mr-1" />Cancelar</button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}

        {filteredProjects.length === 0 && (
          <div className="text-center py-12">
            <p className="text-4xl mb-4">📋</p>
            <p className="text-gray-500">{effectiveViewMode === 'client' ? 'No tenés proyectos asignados todavía' : 'No hay proyectos. ¡Creá el primero!'}</p>
          </div>
        )}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<ProjectManager />);
  </script>
</body>
</html>
