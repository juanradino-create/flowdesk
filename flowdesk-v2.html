<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowdesk</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, setDoc, deleteDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1xGu9l4eg0gyQNAoeyQDdYRMphjeiOS0",
      authDomain: "flowdesk-c18bf.firebaseapp.com",
      projectId: "flowdesk-c18bf",
      storageBucket: "flowdesk-c18bf.appspot.com",
      messagingSenderId: "468967336736",
      appId: "1:468967336736:web:YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Expose to global for React component
    window.__firebaseDb = db;
    window.__firebaseAuth = auth;
    window.__firebaseProvider = provider;
    window.__firebaseImports = { collection, doc, getDoc, setDoc, deleteDoc, onSnapshot, getDocs, signInWithPopup, onAuthStateChanged, signOut, GoogleAuthProvider };
  </script>
</head>
<body style="margin:0">
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    // Lucide icons inline
    const iconProps = (size=24) => ({ width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" });
    const Plus = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    const ChevronDown = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><polyline points="6 9 12 15 18 9"/></svg>;
    const ChevronRight = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><polyline points="9 18 15 12 9 6"/></svg>;
    const Eye = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>;
    const Edit2 = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>;
    const Check = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><polyline points="20 6 9 17 4 12"/></svg>;
    const X = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const Trash2 = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
    const FileText = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
    const Paperclip = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>;
    const Download = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
    const Share2 = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>;
    const Link = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
    const User = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const Users = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const Filter = ({size=24,className=""}) => <svg {...iconProps(size)} className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;

const ProjectManager = () => {
  const [currentUser, setCurrentUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [showRoleSelect, setShowRoleSelect] = useState(false);
  const [pendingGoogleUser, setPendingGoogleUser] = useState(null);
  
  const [projects, setProjects] = useState([]);
  const [viewMode, setViewMode] = useState('work');
  const [filterMode, setFilterMode] = useState('all');
  const [expandedProjects, setExpandedProjects] = useState({});
  const [showAddProject, setShowAddProject] = useState(false);
  const [newProjectName, setNewProjectName] = useState('');
  const [addingObjectiveTo, setAddingObjectiveTo] = useState(null);
  const [newObjectiveName, setNewObjectiveName] = useState('');
  const [addingSubObjectiveTo, setAddingSubObjectiveTo] = useState(null);
  const [newSubObjectiveName, setNewSubObjectiveName] = useState('');
  const [editingNotes, setEditingNotes] = useState(null);
  const [noteText, setNoteText] = useState('');
  const [assigningTo, setAssigningTo] = useState(null);
  const [teamMembers, setTeamMembers] = useState([]);
  const [showTeamPanel, setShowTeamPanel] = useState(false);
  const [newMemberName, setNewMemberName] = useState('');
  const [newMemberEmail, setNewMemberEmail] = useState('');
  const [newMemberRole, setNewMemberRole] = useState('team');
  const [managingAccessFor, setManagingAccessFor] = useState(null);
  const [confirmDialog, setConfirmDialog] = useState(null);
  const [showNotifications, setShowNotifications] = useState(false);
  const [seenNotifications, setSeenNotifications] = useState(() => {
    try { return JSON.parse(localStorage.getItem('seenNotifications') || '[]'); } catch { return []; }
  });
  const [clientComment, setClientComment] = useState('');
  const [editingClientComment, setEditingClientComment] = useState(null);
  const [addingLinkTo, setAddingLinkTo] = useState(null);
  const [linkUrl, setLinkUrl] = useState('');
  const [linkName, setLinkName] = useState('');
  const [firebaseStatus, setFirebaseStatus] = useState('connecting');
  const [saveError, setSaveError] = useState(null);

  const unsubscribeRef = useRef([]);

  // Effective view mode: clients always see client view
  const effectiveViewMode = currentUser?.role === 'client' ? 'client' : viewMode;

  // ==================== FIREBASE AUTH ====================
  useEffect(() => {
    const auth = window.__firebaseAuth;
    if (!auth) { setAuthLoading(false); return; }
    const { onAuthStateChanged } = window.__firebaseImports;
    const unsub = onAuthStateChanged(auth, async (user) => {
      if (user) {
        // Check if user exists in members
        const db = window.__firebaseDb;
        const { doc, getDoc } = window.__firebaseImports;
        let members = [];
        try {
          const mSnap = await getDoc(doc(db, 'flowdesk', 'members'));
          if (mSnap.exists()) members = mSnap.data().list || [];
        } catch(e) { console.error('Error loading members:', e); }
        
        const existing = members.find(m => m.email === user.email);
        if (existing) {
          const u = { name: user.displayName || existing.name, email: user.email, role: existing.role, photoURL: user.photoURL };
          setCurrentUser(u);
          localStorage.setItem('currentUser', JSON.stringify(u));
          if (existing.role === 'client') setViewMode('client');
          setShowRoleSelect(false);
          setAuthLoading(false);
        } else {
          // New user - ask role
          setPendingGoogleUser(user);
          setShowRoleSelect(true);
          setAuthLoading(false);
        }
      } else {
        setCurrentUser(null);
        setAuthLoading(false);
      }
    });
    return () => unsub();
  }, []);

  const handleGoogleLogin = async () => {
    const auth = window.__firebaseAuth;
    const provider = window.__firebaseProvider;
    const { signInWithPopup } = window.__firebaseImports;
    try {
      await signInWithPopup(auth, provider);
    } catch (error) {
      console.error('Login error:', error);
      if (error.code === 'auth/popup-closed-by-user') return;
      alert('Error al iniciar sesión: ' + error.message);
    }
  };

  const completeRoleSelection = async (role) => {
    if (!pendingGoogleUser) return;
    const user = pendingGoogleUser;
    const newMember = {
      name: user.displayName || 'Usuario',
      email: user.email,
      id: Date.now(),
      joinedAt: new Date().toISOString(),
      role: role
    };
    const updatedMembers = [...teamMembers, newMember];
    setTeamMembers(updatedMembers);
    await saveTeamMembers(updatedMembers);
    
    const u = { name: user.displayName || 'Usuario', email: user.email, role: role, photoURL: user.photoURL };
    setCurrentUser(u);
    localStorage.setItem('currentUser', JSON.stringify(u));
    if (role === 'client') setViewMode('client');
    setShowRoleSelect(false);
    setPendingGoogleUser(null);
  };

  const handleLogout = async () => {
    const auth = window.__firebaseAuth;
    const { signOut } = window.__firebaseImports;
    try { await signOut(auth); } catch(e) { console.error(e); }
    setCurrentUser(null);
    localStorage.removeItem('currentUser');
    setProjects([]);
  };

  // ==================== FIREBASE DATA ====================
  useEffect(() => {
    if (!currentUser) return;
    const db = window.__firebaseDb;
    const { collection, onSnapshot, doc } = window.__firebaseImports;

    // Listen to projects collection
    const unsub1 = onSnapshot(collection(db, 'flowdesk_projects'), (snapshot) => {
      const allProjects = [];
      snapshot.forEach(d => allProjects.push({ ...d.data(), _docId: d.id }));
      allProjects.sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || ''));
      setProjects(allProjects);
      setFirebaseStatus('connected');
    }, (error) => {
      console.error('Firestore projects error:', error);
      setFirebaseStatus('error');
    });

    // Listen to members
    const unsub2 = onSnapshot(doc(db, 'flowdesk', 'members'), (snap) => {
      if (snap.exists()) {
        setTeamMembers(snap.data().list || []);
      }
    }, (error) => {
      console.error('Firestore members error:', error);
    });

    unsubscribeRef.current = [unsub1, unsub2];
    return () => unsubscribeRef.current.forEach(u => u());
  }, [currentUser]);

  const saveProject = async (project) => {
    const db = window.__firebaseDb;
    const { doc, setDoc } = window.__firebaseImports;
    try {
      const docId = String(project.id);
      const { _docId, ...data } = project;
      await setDoc(doc(db, 'flowdesk_projects', docId), data);
      setSaveError(null);
    } catch (error) {
      console.error('Error saving project:', error);
      setSaveError('Error al guardar. Verificá la conexión.');
      setTimeout(() => setSaveError(null), 5000);
    }
  };

  const deleteProject = async (projectId) => {
    const db = window.__firebaseDb;
    const { doc, deleteDoc } = window.__firebaseImports;
    try {
      await deleteDoc(doc(db, 'flowdesk_projects', String(projectId)));
    } catch (error) {
      console.error('Error deleting project:', error);
      setSaveError('Error al eliminar.');
    }
  };

  const saveTeamMembers = async (members) => {
    const db = window.__firebaseDb;
    const { doc, setDoc } = window.__firebaseImports;
    try {
      await setDoc(doc(db, 'flowdesk', 'members'), { list: members });
    } catch (error) {
      console.error('Error saving members:', error);
    }
  };

  // ==================== HELPER FUNCTIONS ====================
  const getObjectiveProgress = (objective) => {
    if (!objective.subObjectives || objective.subObjectives.length === 0) {
      return { completed: objective.status === 'completed' ? 1 : 0, total: 1 };
    }
    const total = objective.subObjectives.length;
    const completed = objective.subObjectives.filter(s => s.status === 'completed').length;
    return { completed, total };
  };

  const getNotifications = () => {
    if (currentUser?.role === 'client') return [];
    const notes = [];
    projects.forEach(project => {
      project.objectives?.forEach(obj => {
        if (obj.clientComment) {
          const commentText = typeof obj.clientComment === 'object' ? obj.clientComment.text : obj.clientComment;
          const commentAuthor = typeof obj.clientComment === 'object' ? obj.clientComment.author : null;
          notes.push({
            id: `comment-obj-${obj.id}`,
            projectName: project.name,
            text: `💬 Comentario en "${obj.name}"`,
            detail: commentText,
            type: 'comment'
          });
        }
        obj.subObjectives?.forEach(sub => {
          if (sub.clientComment) {
            const commentText = typeof sub.clientComment === 'object' ? sub.clientComment.text : sub.clientComment;
            notes.push({
              id: `comment-sub-${sub.id}`,
              projectName: project.name,
              text: `💬 Comentario en tarea "${sub.name}"`,
              detail: commentText,
              type: 'comment'
            });
          }
        });
      });
    });
    return notes;
  };

  const getDueDateStatus = (dueDate, status) => {
    if (!dueDate || status === 'completed') return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(dueDate);
    const diffDays = Math.ceil((due - today) / (1000*60*60*24));
    if (diffDays < 0) return { label: `Vencida hace ${Math.abs(diffDays)} día${Math.abs(diffDays)!==1?'s':''}`, color: 'text-red-600 bg-red-50 border-red-200' };
    if (diffDays === 0) return { label: 'Vence hoy', color: 'text-orange-600 bg-orange-50 border-orange-200' };
    if (diffDays <= 3) return { label: `Vence en ${diffDays} día${diffDays!==1?'s':''}`, color: 'text-yellow-600 bg-yellow-50 border-yellow-200' };
    return { label: `Vence ${new Date(dueDate).toLocaleDateString('es-ES',{day:'2-digit',month:'short'})}`, color: 'text-gray-500 bg-gray-50 border-gray-200' };
  };

  const markNotificationSeen = (id) => {
    const updated = [...new Set([...seenNotifications, id])];
    setSeenNotifications(updated);
    localStorage.setItem('seenNotifications', JSON.stringify(updated));
  };

  const markAllSeen = () => {
    const allIds = getNotifications().map(n => n.id);
    const updated = [...new Set([...seenNotifications, ...allIds])];
    setSeenNotifications(updated);
    localStorage.setItem('seenNotifications', JSON.stringify(updated));
  };

  const isPreviousCompleted = (objective, subId) => {
    const idx = objective.subObjectives.findIndex(s => s.id === subId);
    if (idx <= 0) return true;
    return objective.subObjectives[idx - 1].status === 'completed';
  };

  const getAssignableMembers = () => {
    if (!currentUser) return teamMembers;
    const alreadyIn = teamMembers.some(m => m.email === currentUser.email);
    if (alreadyIn) return teamMembers;
    return [currentUser, ...teamMembers];
  };

  const isProjectAdmin = (project) => {
    return project.createdByEmail === currentUser?.email || !project.createdByEmail;
  };

  const canAccessProject = (project) => {
    if (isProjectAdmin(project)) return true;
    if (!project.allowedMembers || project.allowedMembers.length === 0) {
      return project.createdByEmail === currentUser?.email;
    }
    return project.allowedMembers.includes(currentUser?.email);
  };

  const toggleProjectAccess = (projectId, memberEmail) => {
    const project = projects.find(p => p.id === projectId);
    if (!project) return;
    const allowed = project.allowedMembers || [];
    const hasAccess = allowed.includes(memberEmail);
    const updated = {
      ...project,
      allowedMembers: hasAccess ? allowed.filter(e => e !== memberEmail) : [...allowed, memberEmail]
    };
    saveProject(updated);
  };

  const getFilteredProjects = () => {
    const accessible = projects.filter(p => canAccessProject(p));
    if (filterMode === 'all') return accessible;
    return accessible.map(project => ({
      ...project,
      objectives: (project.objectives||[]).filter(obj => {
        const isMyTask = obj.assignedTo?.email === currentUser?.email;
        const hasMySubTask = (obj.subObjectives||[]).some(sub => sub.assignedTo?.email === currentUser?.email);
        return isMyTask || hasMySubTask;
      }).map(obj => ({
        ...obj,
        subObjectives: (obj.subObjectives||[]).filter(sub => filterMode === 'all' || sub.assignedTo?.email === currentUser?.email)
      }))
    })).filter(project => project.objectives.length > 0);
  };

  // ==================== DATA MUTATIONS ====================
  const addProject = () => {
    if (!newProjectName.trim()) return;
    const newProject = {
      id: Date.now(),
      name: newProjectName,
      objectives: [],
      createdAt: new Date().toISOString(),
      createdBy: currentUser.name,
      createdByEmail: currentUser.email,
      allowedMembers: [currentUser.email]
    };
    saveProject(newProject);
    setNewProjectName('');
    setShowAddProject(false);
  };

  const updateProjectInFirebase = (projectId, updater) => {
    const project = projects.find(p => p.id === projectId);
    if (!project) return;
    const updated = updater(project);
    saveProject(updated);
  };

  const addObjective = (projectId, objectiveName) => {
    if (!objectiveName.trim()) return;
    updateProjectInFirebase(projectId, (p) => ({
      ...p,
      objectives: [...(p.objectives||[]), {
        id: Date.now(),
        name: objectiveName,
        status: 'pending',
        subObjectives: [],
        notes: '',
        files: [],
        assignedTo: null,
        dueDate: null,
        clientComment: null,
        history: [{ id: Date.now(), user: currentUser.name, userEmail: currentUser.email, action: 'created', details: 'Objetivo creado', timestamp: new Date().toISOString() }]
      }]
    }));
    setAddingObjectiveTo(null);
    setNewObjectiveName('');
  };

  const addSubObjective = (projectId, objectiveId, subName) => {
    if (!subName.trim()) return;
    updateProjectInFirebase(projectId, (p) => ({
      ...p,
      objectives: (p.objectives||[]).map(o => o.id !== objectiveId ? o : {
        ...o,
        subObjectives: [...(o.subObjectives||[]), {
          id: Date.now(),
          name: subName,
          status: 'pending',
          notes: '',
          files: [],
          assignedTo: null,
          dueDate: null,
          requiresPrevious: false,
          clientComment: null,
          history: [{ id: Date.now(), user: currentUser.name, userEmail: currentUser.email, action: 'created', details: 'Tarea creada', timestamp: new Date().toISOString() }]
        }]
      })
    }));
    setAddingSubObjectiveTo(null);
    setNewSubObjectiveName('');
  };

  const updateStatus = (projectId, objectiveId, subObjectiveId, newStatus) => {
    updateProjectInFirebase(projectId, (p) => ({
      ...p,
      objectives: (p.objectives||[]).map(o => {
        if (o.id !== objectiveId) return o;
        if (subObjectiveId) {
          return { ...o, subObjectives: (o.subObjectives||[]).map(s => s.id === subObjectiveId ? { ...s, status: newStatus } : s) };
        }
        return { ...o, status: newStatus };
      })
    }));
  };

  const updateDueDate = (projectId, objectiveId, subObjectiveId, date) => {
    updateProjectInFirebase(projectId, (p) => ({
      ...p,
      objectives: (p.objectives||[]).map(o => {
        if (o.id !== objectiveId) return o;
        if (subObjectiveId) {
          return { ...o, subObjectives: (o.subObjectives||[]).map(s => s.id === subObjectiveId ? { ...s, dueDate: date } : s) };
        }
        return { ...o, dueDate: date };
      })
    }));
  };

  const assignTask = (projectId, objectiveId, subObjectiveId, member) => {
    updateProjectInFirebase(projectId, (p) => ({
      ...p,
      objectives: (p.objectives||[]).map(o => {
        if (o.id !== objectiveId) return o;
        if (subObjectiveId) {
          return { ...o, subObjectives: (o.subObjectives||[]).map(s => s.id === subObjectiveId ? { ...s, assignedTo: member } : s) };
        }
        return { ...o, assignedTo: member };
      })
    }));
    setAssigningTo(null);
  };

  const updateNotes = (projectId, objectiveId, subObjectiveId, notes) => {
    updateProjectInFirebase(projectId, (p) => ({
      ...p,
      objectives: (p.objectives||[]).map(o => {
        if (o.id !== objectiveId) return o;
        if (subObjectiveId) {
          return { ...o, subObjectives: (o.subObjectives||[]).map(s => s.id === subObjectiveId ? { ...s, notes } : s) };
        }
        return { ...o, notes };
      })
    }));
    setEditingNotes(null);
    setNoteText('');
  };

  const saveClientComment = (projectId, objectiveId, subObjectiveId, comment) => {
    const commentData = {
      text: comment,
      author: currentUser.name,
      role: currentUser.role,
      timestamp: new Date().toISOString()
    };
    updateProjectInFirebase(projectId, (p) => ({
      ...p,
      objectives: (p.objectives||[]).map(o => {
        if (o.id !== objectiveId) return o;
        if (subObjectiveId) {
          return { ...o, subObjectives: (o.subObjectives||[]).map(s => s.id === subObjectiveId ? { ...s, clientComment: commentData } : s) };
        }
        return { ...o, clientComment: commentData };
      })
    }));
    setEditingClientComment(null);
    setClientComment('');
  };

  const approveTask = (projectId, objectiveId, subObjectiveId) => {
    updateProjectInFirebase(projectId, (p) => ({
      ...p,
      objectives: (p.objectives||[]).map(o => {
        if (o.id !== objectiveId) return o;
        if (subObjectiveId) {
          return { ...o, subObjectives: (o.subObjectives||[]).map(s => s.id === subObjectiveId ? { ...s, status: 'in-progress' } : s) };
        }
        return { ...o, status: 'in-progress' };
      })
    }));
  };

  const toggleRequiresPrevious = (projectId, objectiveId, subId) => {
    updateProjectInFirebase(projectId, (p) => ({
      ...p,
      objectives: (p.objectives||[]).map(o => {
        if (o.id !== objectiveId) return o;
        return { ...o, subObjectives: (o.subObjectives||[]).map(s => s.id === subId ? { ...s, requiresPrevious: !s.requiresPrevious } : s) };
      })
    }));
  };

  const moveTask = (projectId, objectiveId, subId, direction) => {
    updateProjectInFirebase(projectId, (p) => ({
      ...p,
      objectives: (p.objectives||[]).map(o => {
        if (o.id !== objectiveId) return o;
        const subs = [...(o.subObjectives||[])];
        const idx = subs.findIndex(s => s.id === subId);
        if (direction === 'up' && idx === 0) return o;
        if (direction === 'down' && idx === subs.length - 1) return o;
        const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
        [subs[idx], subs[swapIdx]] = [subs[swapIdx], subs[idx]];
        return { ...o, subObjectives: subs };
      })
    }));
  };

  const handleDeleteItem = (projectId, objectiveId, subObjectiveId) => {
    const label = !objectiveId ? 'este proyecto y todo su contenido' : !subObjectiveId ? 'este objetivo' : 'esta tarea';
    setConfirmDialog({
      message: `¿Eliminar ${label}? Esta acción no se puede deshacer.`,
      onConfirm: () => {
        if (!objectiveId) {
          deleteProject(projectId);
        } else if (!subObjectiveId) {
          updateProjectInFirebase(projectId, (p) => ({ ...p, objectives: (p.objectives||[]).filter(o => o.id !== objectiveId) }));
        } else {
          updateProjectInFirebase(projectId, (p) => ({
            ...p,
            objectives: (p.objectives||[]).map(o => o.id !== objectiveId ? o : { ...o, subObjectives: (o.subObjectives||[]).filter(s => s.id !== subObjectiveId) })
          }));
        }
        setConfirmDialog(null);
      }
    });
  };

  const handleDeleteFile = (projectId, objectiveId, subObjectiveId, fileId) => {
    setConfirmDialog({
      message: '¿Eliminar este archivo?',
      onConfirm: () => {
        updateProjectInFirebase(projectId, (p) => ({
          ...p,
          objectives: (p.objectives||[]).map(o => {
            if (o.id !== objectiveId) return o;
            if (subObjectiveId) {
              return { ...o, subObjectives: (o.subObjectives||[]).map(s => s.id === subObjectiveId ? { ...s, files: (s.files||[]).filter(f => f.id !== fileId) } : s) };
            }
            return { ...o, files: (o.files||[]).filter(f => f.id !== fileId) };
          })
        }));
        setConfirmDialog(null);
      }
    });
  };

  // ==================== LINK SYSTEM ====================
  const detectLinkType = (url) => {
    if (url.includes('drive.google.com')) return 'gdrive';
    if (url.includes('dropbox.com')) return 'dropbox';
    if (url.includes('onedrive.live.com') || url.includes('1drv.ms') || url.includes('sharepoint.com')) return 'onedrive';
    if (url.toLowerCase().endsWith('.pdf')) return 'pdf';
    if (/\.(jpg|jpeg|png|gif|webp|svg)$/i.test(url)) return 'image';
    return 'link';
  };

  const handleAddLink = (projectId, objectiveId, subObjectiveId) => {
    if (!linkUrl.trim()) return;
    const type = detectLinkType(linkUrl);
    const name = linkName.trim() || linkUrl.split('/').pop() || 'Link externo';
    const file = { id: Date.now(), name, url: linkUrl, type, addedAt: new Date().toISOString(), addedBy: currentUser.name };
    
    updateProjectInFirebase(projectId, (p) => ({
      ...p,
      objectives: (p.objectives||[]).map(o => {
        if (o.id !== objectiveId) return o;
        if (subObjectiveId) {
          return { ...o, subObjectives: (o.subObjectives||[]).map(s => s.id === subObjectiveId ? { ...s, files: [...(s.files||[]), file] } : s) };
        }
        return { ...o, files: [...(o.files||[]), file] };
      })
    }));
    setAddingLinkTo(null);
    setLinkUrl('');
    setLinkName('');
  };

  // ==================== TEAM MEMBERS ====================
  const addManualMember = () => {
    if (!newMemberName.trim() || !newMemberEmail.trim()) return;
    if (teamMembers.some(m => m.email === newMemberEmail.trim())) {
      alert('Ya existe un miembro con ese email');
      return;
    }
    const newMember = { name: newMemberName.trim(), email: newMemberEmail.trim(), id: Date.now(), joinedAt: new Date().toISOString(), manual: true, role: newMemberRole };
    const updated = [...teamMembers, newMember];
    setTeamMembers(updated);
    saveTeamMembers(updated);
    setNewMemberName('');
    setNewMemberEmail('');
    setNewMemberRole('team');
  };

  const removeMember = (memberId) => {
    const member = teamMembers.find(m => m.id === memberId);
    setConfirmDialog({
      message: `¿Eliminar a ${member?.name} del equipo?`,
      onConfirm: () => {
        const updated = teamMembers.filter(m => m.id !== memberId);
        setTeamMembers(updated);
        saveTeamMembers(updated);
        setConfirmDialog(null);
      }
    });
  };

  // ==================== DISPLAY HELPERS ====================
  const getStatusColor = (status) => {
    switch(status) {
      case 'completed': return 'bg-green-500';
      case 'in-progress': return 'bg-yellow-500';
      case 'waiting': return 'bg-orange-400';
      default: return 'bg-gray-400';
    }
  };

  const getStatusText = (status) => {
    switch(status) {
      case 'completed': return 'Completado';
      case 'in-progress': return 'En Progreso';
      case 'waiting': return 'En Espera';
      default: return 'Pendiente';
    }
  };

  const calculateProgress = (objectives) => {
    if (!objectives || objectives.length === 0) return 0;
    const total = objectives.reduce((acc, obj) => acc + ((obj.subObjectives||[]).length || 1), 0);
    const completed = objectives.reduce((acc, obj) => {
      if (!obj.subObjectives || obj.subObjectives.length === 0) return acc + (obj.status === 'completed' ? 1 : 0);
      return acc + obj.subObjectives.filter(s => s.status === 'completed').length;
    }, 0);
    return Math.round((completed / total) * 100);
  };

  const getFileIcon = (type) => {
    if (type === 'gdrive') return <span className="text-base">📁</span>;
    if (type === 'dropbox') return <span className="text-base">📦</span>;
    if (type === 'onedrive') return <span className="text-base">☁️</span>;
    if (type === 'pdf') return <span className="text-base">📄</span>;
    if (type === 'image') return <span className="text-base">🖼️</span>;
    return <Link size={16} className="text-blue-500" />;
  };

  const formatFileSize = (bytes) => {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  };

  const renderCommentDisplay = (comment, isReadOnly = false) => {
    if (!comment) return null;
    const text = typeof comment === 'object' ? comment.text : comment;
    const author = typeof comment === 'object' ? comment.author : null;
    const role = typeof comment === 'object' ? comment.role : null;
    const timestamp = typeof comment === 'object' ? comment.timestamp : null;
    if (!text) return null;
    
    return (
      <div className={`mt-2 p-2 rounded border-l-2 ${isReadOnly ? 'bg-gray-50 border-gray-300' : 'bg-blue-50 border-blue-400'}`}>
        <div className="flex items-center gap-2 mb-1">
          <span className="text-xs">{role === 'client' ? '👁️' : '🛠️'}</span>
          <span className="text-xs font-semibold text-gray-700">{author || 'Usuario'}</span>
          {timestamp && <span className="text-xs text-gray-400">• {new Date(timestamp).toLocaleDateString('es-ES', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}</span>}
        </div>
        <p className="text-xs text-gray-700">{text}</p>
      </div>
    );
  };

  const renderAddLinkPanel = (projectId, objectiveId, subObjectiveId) => {
    const key = subObjectiveId ? `sub-${subObjectiveId}` : `obj-${objectiveId}`;
    if (addingLinkTo !== key) return null;
    return (
      <div className="mt-2 bg-blue-50 p-3 rounded border border-blue-200">
        <p className="text-xs font-semibold text-blue-700 mb-2">🔗 Agregar link externo</p>
        <input type="url" value={linkUrl} onChange={e => setLinkUrl(e.target.value)} placeholder="https://drive.google.com/..." className="w-full p-2 border border-gray-300 rounded mb-2 text-xs" autoFocus />
        <input type="text" value={linkName} onChange={e => setLinkName(e.target.value)} placeholder="Nombre del archivo (opcional)" className="w-full p-2 border border-gray-300 rounded mb-2 text-xs" />
        <p className="text-xs text-gray-400 mb-2">Google Drive, Dropbox, OneDrive o cualquier link público.</p>
        <div className="flex gap-2">
          <button onClick={() => handleAddLink(projectId, objectiveId, subObjectiveId)} className="flex-1 bg-blue-600 text-white py-1.5 rounded text-xs font-medium"><Check size={12} className="inline mr-1" />Agregar</button>
          <button onClick={() => { setAddingLinkTo(null); setLinkUrl(''); setLinkName(''); }} className="flex-1 bg-gray-300 text-gray-700 py-1.5 rounded text-xs"><X size={12} className="inline mr-1" />Cancelar</button>
        </div>
      </div>
    );
  };

  const renderFile = (file, projectId, objectiveId, subObjectiveId, isSmall = false) => {
    const href = file.url || file.data || '#';
    const isLink = !!file.url;
    return (
      <div key={file.id} className={"flex items-center gap-2 bg-gray-50 p-2 rounded " + (isSmall ? "text-xs" : "")}>
        {getFileIcon(file.type)}
        <div className="flex-1 min-w-0">
          <p className={"font-medium truncate " + (isSmall ? "text-xs" : "text-sm")}>{file.name}</p>
          {file.size && <p className="text-xs text-gray-500">{formatFileSize(file.size)}</p>}
          {isLink && <p className="text-xs text-gray-400 truncate">{file.url}</p>}
        </div>
        <a href={href} target="_blank" rel="noopener noreferrer" className="p-1 text-blue-600 hover:bg-blue-50 rounded" title={isLink ? 'Abrir link' : 'Descargar'}>
          {isLink ? <Share2 size={isSmall ? 12 : 14} /> : <Download size={isSmall ? 12 : 14} />}
        </a>
        {effectiveViewMode === 'work' && (
          <button onClick={() => handleDeleteFile(projectId, objectiveId, subObjectiveId, file.id)} className="p-1 text-red-500 hover:bg-red-50 rounded"><X size={isSmall ? 12 : 14} /></button>
        )}
      </div>
    );
  };

  const downloadReport = (project) => {
    const objectives = project.objectives || [];
    const progress = calculateProgress(objectives);

    // ---- Compute report data ----
    const totalObjectives = objectives.length;
    const completedObj = objectives.filter(o => o.status === 'completed').length;
    const inProgressObj = objectives.filter(o => o.status === 'in-progress').length;
    const waitingObj = objectives.filter(o => o.status === 'waiting').length;
    const pendingObj = objectives.filter(o => o.status === 'pending').length;

    let totalTasks = 0, completedTasks = 0;
    objectives.forEach(o => {
      const subs = o.subObjectives || [];
      if (subs.length === 0) { totalTasks++; if (o.status === 'completed') completedTasks++; }
      else { totalTasks += subs.length; completedTasks += subs.filter(s => s.status === 'completed').length; }
    });

    // Items needing attention: overdue, waiting approval, or blocked
    const attentionItems = [];
    const today = new Date(); today.setHours(0,0,0,0);
    objectives.forEach((o, i) => {
      if (o.status === 'waiting') attentionItems.push({ name: o.name, reason: 'Esperando aprobación' });
      if (o.dueDate) { const d = new Date(o.dueDate); if (d < today && o.status !== 'completed') attentionItems.push({ name: o.name, reason: 'Fecha vencida (' + d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'}) + ')' }); }
      (o.subObjectives || []).forEach(s => {
        if (s.status === 'waiting') attentionItems.push({ name: s.name, reason: 'Esperando aprobación' });
        if (s.dueDate) { const d = new Date(s.dueDate); if (d < today && s.status !== 'completed') attentionItems.push({ name: s.name, reason: 'Fecha vencida (' + d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'}) + ')' }); }
      });
    });

    // Next pending tasks (first 3 not completed)
    const nextSteps = [];
    objectives.forEach(o => {
      (o.subObjectives || []).forEach(s => {
        if (s.status !== 'completed' && nextSteps.length < 3) {
          nextSteps.push({ name: s.name, responsible: s.assignedTo?.name || o.assignedTo?.name || 'Sin asignar', due: s.dueDate });
        }
      });
      if ((o.subObjectives||[]).length === 0 && o.status !== 'completed' && nextSteps.length < 3) {
        nextSteps.push({ name: o.name, responsible: o.assignedTo?.name || 'Sin asignar', due: o.dueDate });
      }
    });

    // ---- Build HTML ----
    const css = `*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:16px;color:#333}
