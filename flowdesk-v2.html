// ==================== ONBOARDING COMPONENT ====================
const OnboardingWizard = ({ onComplete, userRole }) => {
  const [currentSlide, setCurrentSlide] = useState(0);
  const [onboardingPath, setOnboardingPath] = useState(userRole === 'client' ? 'client' : null); // null = choosing, 'm360', 'generic', 'client'

  // ---- CLIENT ONBOARDING: single screen ----
  if (onboardingPath === 'client') {
    return (
      <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-start sm:items-center justify-center p-4 pt-12 sm:pt-4">
        <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden">
          <div className="py-8 px-6 flex flex-col items-center text-center">
            <div className="w-16 h-16 bg-green-50 rounded-2xl flex items-center justify-center mb-5 border border-green-100" style={{boxShadow:'0 4px 12px rgba(34,197,94,0.12)'}}>
              <OBIcon type="flowdesk" size={36} />
            </div>
            <h2 className="text-xl font-bold text-gray-800 mb-4">Bienvenido a Flowdesk</h2>
            <div className="w-full space-y-3 text-left mb-6">
              <div className="flex items-start gap-3 bg-gray-50 p-3 rounded-xl">
                <span className="mt-0.5"><BarChart size={20} className="text-indigo-500" /></span>
                <div>
                  <p className="text-sm font-semibold text-gray-800">Seguí el avance</p>
                  <p className="text-xs text-gray-500">Vas a ver el estado de cada objetivo y tarea del proyecto en tiempo real.</p>
                </div>
              </div>
              <div className="flex items-start gap-3 bg-gray-50 p-3 rounded-xl">
                <span className="mt-0.5"><CheckCircle size={20} className="text-green-500" /></span>
                <div>
                  <p className="text-sm font-semibold text-gray-800">Aprobá tareas</p>
                  <p className="text-xs text-gray-500">Cuando una tarea necesite tu autorización, vas a ver un botón para aprobarla.</p>
                </div>
              </div>
              <div className="flex items-start gap-3 bg-gray-50 p-3 rounded-xl">
                <span className="mt-0.5"><MessageCircle size={20} className="text-blue-500" /></span>
                <div>
                  <p className="text-sm font-semibold text-gray-800">Dejá comentarios</p>
                  <p className="text-xs text-gray-500">Podés comentar en cualquier objetivo o tarea para dar feedback al equipo.</p>
                </div>
              </div>
              <div className="flex items-start gap-3 bg-gray-50 p-3 rounded-xl">
                <span className="mt-0.5"><Download size={20} className="text-purple-500" /></span>
                <div>
                  <p className="text-sm font-semibold text-gray-800">Descargá reportes</p>
                  <p className="text-xs text-gray-500">El botón de descarga genera un resumen del estado actual del proyecto.</p>
                </div>
              </div>
            </div>
          </div>
          <div className="px-6 pb-6">
            <button onClick={onComplete} className="w-full py-3.5 bg-green-600 text-white rounded-lg text-sm font-semibold hover:bg-green-700 transition-colors">
              Entendido, ver mi proyecto
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ---- PATH CHOOSER: M360 or Generic (only for team users) ----

  useEffect(() => {

      if (user) {
        // Check if user exists in members
        const db = window.__firebaseDb;
        const { doc, getDoc } = window.__firebaseImports;
        let members = [];
        try {
          const mSnap = await getDoc(doc(db, 'flowdesk', 'members'));
          if (mSnap.exists()) members = mSnap.data().list || [];
        } catch(e) { console.error('Error loading members:', e); }
        
        const existing = members.find(m => m.email === user.email);
        if (existing) {
          const u = { name: user.displayName || existing.name, email: user.email, role: existing.role, photoURL: user.photoURL };
          setCurrentUser(u);
          localStorage.setItem('currentUser', JSON.stringify(u));
          if (existing.role === 'client') setViewMode('client');
          // Check if user has seen onboarding
          const hasSeenOnboarding = localStorage.getItem('flowdesk_onboarding_' + user.email);
          if (!hasSeenOnboarding) {
            setShowOnboarding(true);
          }
          setShowRoleSelect(false);
          setAuthLoading(false);
        } else {
          // New user - ask role
          setPendingGoogleUser(user);
          setShowRoleSelect(true);
          setAuthLoading(false);

      } else {
        setCurrentUser(null);
        setAuthLoading(false);
      }

  // ==================== FIREBASE DATA ====================

    const unsub1 = onSnapshot(collection(db, 'flowdesk_projects'), (snapshot) => {
      const allProjects = [];
      snapshot.forEach(d => allProjects.push({ ...d.data(), _docId: d.id }));
      allProjects.sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || ''));
      setProjects(allProjects);
      setFirebaseStatus('connected');

      setFirebaseStatus('error');
    });

    // Listen to members
    const unsub2 = onSnapshot(doc(db, 'flowdesk', 'members'), (snap) => {
      if (snap.exists()) {
        setTeamMembers(snap.data().list || []);
      }
    }, (error) => {
      console.error('Firestore members error:', error);

    unsubscribeRef.current = [unsub1, unsub2];
    return () => unsubscribeRef.current.forEach(u => u());

  const saveProject = async (project) => {

      await setDoc(doc(db, 'flowdesk', 'members'), { list: members });
    } catch (error) {
      console.error('Error saving members:', error);
    }

  // ==================== HELPER FUNCTIONS ====================
  const getObjectiveProgress = (objective) => {
    if (!objective.subObjectives || objective.subObjectives.length === 0) {
      return { completed: objective.status === 'completed' ? 1 : 0, total: 1 };
    }
    const total = objective.subObjectives.length;
    const completed = objective.subObjectives.filter(s => s.status === 'completed').length;
    return { completed, total };
  };

  const getNotifications = () => {
    if (currentUser?.role === 'client') return [];
    const notes = [];
    projects.forEach(project => {
      project.objectives?.forEach(obj => {
        if (obj.clientComment) {
          const commentText = typeof obj.clientComment === 'object' ? obj.clientComment.text : obj.clientComment;
          notes.push({
            id: `comment-obj-${obj.id}`,
            projectName: project.name,
            text: `<MessageCircle size={12} className="inline mr-1" />Comentario en "${obj.name}"`,
            detail: commentText,
            type: 'comment'
          });
        }
        obj.subObjectives?.forEach(sub => {
          if (sub.clientComment) {
            const commentText = typeof sub.clientComment === 'object' ? sub.clientComment.text : sub.clientComment;
            notes.push({
              id: `comment-sub-${sub.id}`,
              projectName: project.name,
              text: `<MessageCircle size={12} className="inline mr-1" />Comentario en tarea "${sub.name}"`,
              detail: commentText,
              type: 'comment'
            });
          }
          // Diagnostic: bouncing tasks
          if ((sub.statusChangeCount || 0) >= 4 && sub.status !== 'completed') {
            notes.push({
              id: `diag-bounce-${sub.id}`,
              projectName: project.name,
              text: `△ Tarea "${sub.name}" cambia de estado frecuentemente`,
              detail: 'Posible problema de proceso — considerar revisar el diseño de la tarea o crear un checklist',
              type: 'diagnostic'
            });
          }
        });
      });

    return notes;
  };

  const getDueDateStatus = (dueDate, status) => {
    if (!dueDate || status === 'completed') return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(dueDate);
    const diffDays = Math.ceil((due - today) / (1000*60*60*24));
    if (diffDays < 0) return { label: `Vencida hace ${Math.abs(diffDays)} día${Math.abs(diffDays)!==1?'s':''}`, color: 'text-red-600 bg-red-50 border-red-200' };
    if (diffDays === 0) return { label: 'Vence hoy', color: 'text-orange-600 bg-orange-50 border-orange-200' };
    if (diffDays <= 3) return { label: `Vence en ${diffDays} día${diffDays!==1?'s':''}`, color: 'text-yellow-600 bg-yellow-50 border-yellow-200' };
    return { label: `Vence ${new Date(dueDate).toLocaleDateString('es-ES',{day:'2-digit',month:'short'})}`, color: 'text-gray-500 bg-gray-50 border-gray-200' };
  };

  const getIncompetenceDiagnostic = (item) => {
    const warnings = [];
    // Pattern 1: Overdue task
    if (item.dueDate && item.status !== 'completed') {
      const today = new Date(); today.setHours(0,0,0,0);
      const due = new Date(item.dueDate);
      const diffDays = Math.ceil((due - today) / (1000*60*60*24));
      if (diffDays < -3) warnings.push({ type: 'overdue', label: 'Tarea vencida sin resolver', icon: '●' });
    }
    // Pattern 2: Status bouncing (4+ changes = process issue)
    const changes = item.statusChangeCount || 0;
    if (changes >= 6) warnings.push({ type: 'bounce', label: 'Rebota mucho — revisar proceso', icon: '⟳' });
    else if (changes >= 4) warnings.push({ type: 'bounce', label: 'Posible problema de proceso', icon: '△' });
    return warnings;

    if (subs.length === 0) return null;
    const allCompleted = subs.every(s => s.status === 'completed');
    if (allCompleted) return 'completed';
    const anyInProgress = subs.some(s => s.status === 'in-progress');
    const anyCompleted = subs.some(s => s.status === 'completed');
    if (anyInProgress || anyCompleted) return 'in-progress';

            const changed = s.status !== newStatus;
            return { ...s, status: newStatus, statusChangeCount: (s.statusChangeCount || 0) + (changed ? 1 : 0) };
          });
          const updatedObj = { ...o, subObjectives: updatedSubs };
          const autoStatus = computeObjectiveStatus(updatedObj);
          return autoStatus ? { ...updatedObj, status: autoStatus } : updatedObj;

        return { ...o, status: newStatus, statusChangeCount: (o.statusChangeCount || 0) + (changed ? 1 : 0) };

  // ==================== IMPORT FROM EXCEL ====================
  const handleImportExcel = (event) => {
    const file = event.target.files[0];
    if (!file) return;
    event.target.value = '';

    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const XLSX = await import('https://cdn.sheetjs.com/xlsx-0.20.1/package/xlsx.mjs');
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        let headerIdx = -1;
        let colMap = {};
        for (let i = 0; i < Math.min(rows.length, 10); i++) {
          const row = (rows[i] || []).map(c => String(c || '').toLowerCase().trim());
          if (row.includes('objetivo') || row.includes('tarea')) {
            headerIdx = i;
            row.forEach((val, j) => {
              if (val.includes('objetivo')) colMap.objetivo = j;
              if (val.includes('tarea')) colMap.tarea = j;
              if (val.includes('responsable')) colMap.responsable = j;
              if (val.includes('fecha')) colMap.fecha = j;
              if (val.includes('estado')) colMap.estado = j;
              if (val.includes('nota')) colMap.notas = j;
            });
            break;
          }
        }

        if (headerIdx === -1) {
          alert('No se encontró la fila de encabezados. Asegurate de que el archivo tenga columnas "Objetivo" y "Tarea".');
          return;
        }

        let projectName = file.name.replace(/\.xlsx?$/i, '');
        for (let i = 0; i < headerIdx; i++) {
          const row = rows[i] || [];
          for (let j = 0; j < row.length; j++) {
            const val = String(row[j] || '');
            if (j > 0 && row[j] && String(row[j-1] || '').toUpperCase().includes('PROYECTO')) {
              projectName = val.trim();
            }
            if (val && !val.toUpperCase().includes('PROYECTO') && !val.toUpperCase().includes('PLANTILLA') && !val.toUpperCase().includes('INSTRUC') && val.length > 3 && i > 0) {
              if (j === 1 || j === 0) projectName = val.trim();
            }
          }
        }

        const dataRows = rows.slice(headerIdx + 1).filter(r => r && r.length > 0);
        const objectives = [];
        let currentObj = null;

        const mapStatus = (val) => {
          if (!val) return 'pending';
          const v = String(val).toLowerCase().trim();
          if (v.includes('complet') || v.includes('hecho') || v === '1') return 'completed';
          if (v.includes('progreso') || v.includes('curso') || v.includes('en curso')) return 'in-progress';
          if (v.includes('espera')) return 'waiting';
          return 'pending';
        };

        const parseDate = (val) => {
          if (!val) return null;
          if (typeof val === 'number') {
            const d = new Date((val - 25569) * 86400000);
            return d.toISOString().split('T')[0];
          }
          const d = new Date(val);
          return isNaN(d.getTime()) ? null : d.toISOString().split('T')[0];
        };

        for (const row of dataRows) {
          const objName = colMap.objetivo !== undefined ? String(row[colMap.objetivo] || '').trim() : '';
          const taskName = colMap.tarea !== undefined ? String(row[colMap.tarea] || '').trim() : '';
          const responsible = colMap.responsable !== undefined ? String(row[colMap.responsable] || '').trim() : '';
          const fecha = colMap.fecha !== undefined ? parseDate(row[colMap.fecha]) : null;
          const estado = colMap.estado !== undefined ? mapStatus(row[colMap.estado]) : 'pending';
          const notas = colMap.notas !== undefined ? String(row[colMap.notas] || '').trim() : '';

          if (objName) {
            currentObj = {
              id: Date.now() + Math.random() * 10000,
              name: objName, status: 'pending', subObjectives: [], notes: '', files: [],
              assignedTo: null, dueDate: null, clientComment: null,
              history: [{ id: Date.now(), user: currentUser.name, userEmail: currentUser.email, action: 'created', details: 'Importado desde Excel', timestamp: new Date().toISOString() }]
            };
            objectives.push(currentObj);
          }

          if (taskName && currentObj) {
            const assignedMember = responsible ? (getAssignableMembers().find(m => m.name.toLowerCase().includes(responsible.toLowerCase())) || { name: responsible, email: '' }) : null;
            currentObj.subObjectives.push({
              id: Date.now() + Math.random() * 10000,
              name: taskName, status: estado, notes: notas, files: [],
              assignedTo: assignedMember ? { name: assignedMember.name, email: assignedMember.email } : null,
              dueDate: fecha, requiresPrevious: false, clientComment: null,
              history: [{ id: Date.now(), user: currentUser.name, userEmail: currentUser.email, action: 'created', details: 'Importado desde Excel', timestamp: new Date().toISOString() }]
            });
          } else if (taskName && !currentObj) {
            currentObj = {
              id: Date.now() + Math.random() * 10000,
              name: taskName, status: estado, subObjectives: [], notes: notas, files: [],
              assignedTo: null, dueDate: fecha, clientComment: null,
              history: [{ id: Date.now(), user: currentUser.name, userEmail: currentUser.email, action: 'created', details: 'Importado desde Excel', timestamp: new Date().toISOString() }]
            };
            objectives.push(currentObj);
          }
        }

        objectives.forEach(obj => {
          if (obj.subObjectives.length > 0) {
            const auto = computeObjectiveStatus(obj);
            if (auto) obj.status = auto;
          }
        });

        if (objectives.length === 0) {
          alert('No se encontraron datos para importar.');
          return;
        }

        const newProject = {
          id: Date.now(), name: projectName, objectives: objectives,
          createdAt: new Date().toISOString(), createdBy: currentUser.name,
          createdByEmail: currentUser.email, allowedMembers: [currentUser.email]
        };
        saveProject(newProject);
        alert(`Proyecto "${projectName}" importado con ${objectives.length} objetivos.`);
      } catch (error) {
        console.error('Error importing:', error);
        alert('Error al importar el archivo. Asegurate de que sea un archivo .xlsx válido.');
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const calculateProgress = (objectives) => {
    if (!objectives || objectives.length === 0) return 0;
    const total = objectives.reduce((acc, obj) => acc + ((obj.subObjectives||[]).length || 1), 0);
    const completed = objectives.reduce((acc, obj) => {
      if (!obj.subObjectives || obj.subObjectives.length === 0) return acc + (obj.status === 'completed' ? 1 : 0);
      return acc + obj.subObjectives.filter(s => s.status === 'completed').length;
    }, 0);
    return Math.round((completed / total) * 100);
  };

  const getFileIcon = (type) => {

    if (type === 'dropbox') return <Package size={16} className="text-indigo-500" />;
    if (type === 'onedrive') return <Cloud size={16} className="text-sky-500" />;
    if (type === 'pdf') return <FileText size={16} className="text-red-500" />;

  const formatFileSize = (bytes) => {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  };

  const renderCommentDisplay = (comment, isReadOnly = false) => {
    if (!comment) return null;
    const text = typeof comment === 'object' ? comment.text : comment;
    const author = typeof comment === 'object' ? comment.author : null;

  const renderAddLinkPanel = (projectId, objectiveId, subObjectiveId) => {

  const renderFile = (file, projectId, objectiveId, subObjectiveId, isSmall = false) => {

  const downloadReport = (project) => {
    const objectives = project.objectives || [];
    const progress = calculateProgress(objectives);
    const completedObj = objectives.filter(o => o.status === 'completed').length;
    const inProgressObj = objectives.filter(o => o.status === 'in-progress').length;
    const waitingObj = objectives.filter(o => o.status === 'waiting').length;
    const pendingObj = objectives.filter(o => o.status === 'pending').length;
    let totalTasks = 0, completedTasks = 0;
    objectives.forEach(o => {
      const subs = o.subObjectives || [];
      if (subs.length === 0) { totalTasks++; if (o.status === 'completed') completedTasks++; }
      else { totalTasks += subs.length; completedTasks += subs.filter(s => s.status === 'completed').length; }
    });
    const attentionItems = [];
    const today = new Date(); today.setHours(0,0,0,0);
    objectives.forEach((o) => {
      if (o.status === 'waiting') attentionItems.push({ name: o.name, reason: 'Esperando aprobación' });
      if (o.dueDate) { const d = new Date(o.dueDate); if (d < today && o.status !== 'completed') attentionItems.push({ name: o.name, reason: 'Fecha vencida (' + d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'}) + ')' }); }
      (o.subObjectives || []).forEach(s => {
        if (s.status === 'waiting') attentionItems.push({ name: s.name, reason: 'Esperando aprobación' });
        if (s.dueDate) { const d = new Date(s.dueDate); if (d < today && s.status !== 'completed') attentionItems.push({ name: s.name, reason: 'Fecha vencida (' + d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'}) + ')' }); }
      });
    });
    const nextSteps = [];
    objectives.forEach(o => {
      (o.subObjectives || []).forEach(s => {
        if (s.status !== 'completed' && nextSteps.length < 3) nextSteps.push({ name: s.name, responsible: s.assignedTo?.name || o.assignedTo?.name || 'Sin asignar', due: s.dueDate });
      });
      if ((o.subObjectives||[]).length === 0 && o.status !== 'completed' && nextSteps.length < 3) nextSteps.push({ name: o.name, responsible: o.assignedTo?.name || 'Sin asignar', due: o.dueDate });
    });
    const css = `*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:16px;color:#333}.container{max-width:800px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:30px 24px;text-align:center}.header h1{font-size:24px;margin-bottom:6px}.header .date{opacity:.85;font-size:13px}.progress-section{padding:20px 24px;background:#f8f9fa}.progress-bar{background:#e9ecef;height:28px;border-radius:14px;overflow:hidden;margin-bottom:12px}.progress-fill{height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;border-radius:14px}.stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}.stat{flex:1;min-width:70px;text-align:center;padding:12px 6px 10px;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-top:4px solid #e2e8f0}.stat-icon{font-size:20px;margin-bottom:2px}.stat-val{font-size:32px;font-weight:700;line-height:1.1}.stat-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}.section{padding:16px 24px}.section-title{font-size:14px;font-weight:700;color:#667eea;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #eee}.alert-box{background:#fff5f5;border:1px solid #feb2b2;border-radius:10px;padding:12px 16px;margin-bottom:8px}.alert-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #fed7d7}.alert-item:last-child{border:none}.alert-name{font-size:13px;font-weight:500;color:#c53030}.alert-reason{font-size:11px;color:#e53e3e;background:#fff;padding:2px 8px;border-radius:10px}.next-box{background:#f0fff4;border:1px solid #c6f6d5;border-radius:10px;padding:12px 16px;margin-bottom:8px}.next-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #e2e8f0}.next-item:last-child{border:none}.next-name{font-size:13px;font-weight:500;color:#2d3748}.next-meta{font-size:11px;color:#718096}.obj{margin-bottom:12px;border-radius:10px;overflow:hidden;border:1px solid #e2e8f0}.obj-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px}.obj-header.completed{background:#f0fff4;border-left:4px solid #48bb78}.obj-header.in-progress{background:#fffff0;border-left:4px solid #ecc94b}.obj-header.waiting{background:#fffaf0;border-left:4px solid #ed8936}.obj-header.pending{background:#f7fafc;border-left:4px solid #cbd5e0}.obj-name{font-size:15px;font-weight:600;color:#2d3748;flex:1}.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}.badge-completed{background:#c6f6d5;color:#22543d}.badge-in-progress{background:#fefcbf;color:#744210}.badge-waiting{background:#feebc8;color:#7b341e}.badge-pending{background:#edf2f7;color:#4a5568}.obj-body{padding:8px 16px 12px;background:#fff}.task{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin:4px 0;background:#f7fafc;border-radius:6px;border-left:3px solid #cbd5e0}.task.task-completed{border-left-color:#48bb78;opacity:.7}.task.task-in-progress{border-left-color:#ecc94b}.task.task-waiting{border-left-color:#ed8936}.task-name{font-size:13px;color:#4a5568}.task-info{font-size:11px;color:#a0aec0;margin-top:2px}.notes{background:#fffbeb;border-left:3px solid #fbbf24;padding:8px 12px;margin:6px 0;border-radius:4px;font-size:13px;color:#78350f}.obj-progress{width:100%;background:#e2e8f0;height:6px;border-radius:3px;margin-top:6px}.obj-progress-fill{height:100%;border-radius:3px}.footer{text-align:center;padding:16px;background:#f8f9fa;color:#999;font-size:12px}.no-attention{text-align:center;padding:16px;color:#48bb78;font-size:14px}@media print{body{background:#fff;padding:0}.container{box-shadow:none}}`;
    const progressColor = progress === 100 ? '#48bb78' : progress >= 50 ? '#ecc94b' : '#667eea';
    let attentionHtml = attentionItems.length > 0 ? `<div class="alert-box">${attentionItems.map(a => `<div class="alert-item"><span class="alert-name">△ ${a.name}</span><span class="alert-reason">${a.reason}</span></div>`).join('')}</div>` : `<div class="no-attention">No hay elementos que requieran atención urgente</div>`;
    let nextHtml = nextSteps.length > 0 ? `<div class="next-box">${nextSteps.map(n => `<div class="next-item"><div><span class="next-name">→ ${n.name}</span><div class="next-meta">Responsable: ${n.responsible}${n.due ? ' · ' + new Date(n.due).toLocaleDateString('es-ES',{day:'2-digit',month:'short'}) : ''}</div></div></div>`).join('')}</div>` : '';
    const objectivesHtml = objectives.map((obj, i) => {
      const prog = getObjectiveProgress(obj);
      const pct = prog.total > 0 ? Math.round((prog.completed / prog.total) * 100) : 0;
      const isComplete = pct === 100 || obj.status === 'completed';
      const fillColor = isComplete ? '#48bb78' : pct >= 50 ? '#ecc94b' : '#cbd5e0';
      const dueDateStr = obj.dueDate ? ' · ' + new Date(obj.dueDate).toLocaleDateString('es-ES',{day:'2-digit',month:'short'}) : '';
      const responsibleStr = obj.assignedTo ? ' · ' + obj.assignedTo.name : '';
      if (isComplete) return `<div class="obj"><div class="obj-header completed"><div><span class="obj-name">${i+1}. ${obj.name}</span><div style="font-size:12px;color:#718096;margin-top:2px">${prog.completed}/${prog.total} tareas completadas${responsibleStr}${dueDateStr}</div></div><span class="badge badge-completed">Completado</span></div></div>`;
      const tasksHtml = (obj.subObjectives||[]).map((sub, j) => {
        const subDue = sub.dueDate ? ' · ' + new Date(sub.dueDate).toLocaleDateString('es-ES',{day:'2-digit',month:'short'}) : '';
        const subResp = sub.assignedTo ? sub.assignedTo.name : '';
        return `<div class="task task-${sub.status}"><div><span class="task-name">${i+1}.${j+1} ${sub.name}</span><div class="task-info">${subResp}${subDue}</div></div><span class="badge badge-${sub.status}">${getStatusText(sub.status)}</span></div>`;
      }).join('');
      const notesHtml = obj.notes ? `<div class="notes">${obj.notes}</div>` : '';
      return `<div class="obj"><div class="obj-header ${obj.status}"><div><span class="obj-name">${i+1}. ${obj.name}</span><div style="font-size:12px;color:#718096;margin-top:2px">${prog.completed}/${prog.total} tareas${responsibleStr}${dueDateStr}</div><div class="obj-progress"><div class="obj-progress-fill" style="width:${pct}%;background:${fillColor}"></div></div></div><span class="badge badge-${obj.status}">${getStatusText(obj.status)}</span></div><div class="obj-body">${notesHtml}${tasksHtml}</div></div>`;
    }).join('');
    const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Reporte: ${project.name}</title><style>${css}</style></head><body><div class="container"><div class="header"><h1>${project.name}</h1><p class="date">Reporte generado el ${new Date().toLocaleDateString('es-ES',{year:'numeric',month:'long',day:'numeric'})}</p></div><div class="progress-section"><div class="progress-bar"><div class="progress-fill" style="width:${Math.max(progress,8)}%;background:${progressColor}">${progress}% Completado</div></div><p style="text-align:center;font-size:13px;color:#4a5568;margin-bottom:8px;font-weight:600">${objectives.length} objetivos</p><div class="stats"><div class="stat" style="border-top-color:#48bb78"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#48bb78" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div class="stat-val" style="color:#48bb78">${completedObj}</div><div class="stat-label">Completados</div></div><div class="stat" style="border-top-color:#ecc94b"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d69e2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></div><div class="stat-val" style="color:#d69e2e">${inProgressObj}</div><div class="stat-label">En progreso</div></div><div class="stat" style="border-top-color:#ed8936"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ed8936" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="stat-val" style="color:#ed8936">${waitingObj}</div><div class="stat-label">En espera</div></div><div class="stat" style="border-top-color:#a0aec0"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a0aec0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg></div><div class="stat-val" style="color:#a0aec0">${pendingObj}</div><div class="stat-label">Pendientes</div></div></div><p style="text-align:center;font-size:12px;color:#718096;margin-top:12px;background:#edf2f7;padding:8px 12px;border-radius:8px">${totalTasks} tareas en total · ${completedTasks} completadas · ${totalTasks - completedTasks} pendientes</p></div><div class="section"><div class="section-title">⚡ Requiere tu atención</div>${attentionHtml}</div><div class="section"><div class="section-title">→ Próximos pasos</div>${nextHtml}</div><div class="section"><div class="section-title">Detalle por objetivo</div>${objectivesHtml}</div><div class="footer">© ${new Date().getFullYear()} - Flowdesk</div></div></body></html>`;
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Reporte_${project.name.replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // ==================== RENDER ====================
  
  if (authLoading) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center">
        <div className="text-center">
          <div className="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
          <p className="text-gray-600">Cargando...</p>
        </div>
      </div>
    );
  }

  if (showRoleSelect && pendingGoogleUser) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
        <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
          <div className="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <Users size={40} className="text-white" />
          </div>
          <h2 className="text-xl font-bold text-gray-800 mb-2">¡Bienvenido/a!</h2>
          <p className="text-gray-500 mb-6">{pendingGoogleUser.displayName}, ¿cuál es tu rol?</p>
          <div className="grid grid-cols-2 gap-3">
            <button onClick={() => completeRoleSelection('team')} className="p-4 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 transition-all">
              <div className="mb-2"><Wrench size={36} className="text-indigo-600 mx-auto" /></div>
              <p className="font-semibold">Equipo</p>
            </button>
            <button onClick={() => completeRoleSelection('client')} className="p-4 rounded-xl border-2 border-green-500 bg-green-50 text-green-700 hover:bg-green-100 transition-all">
              <div className="mb-2"><Eye size={36} className="text-green-600 mx-auto" /></div>
              <p className="font-semibold">Cliente</p>
            </button>
          </div>
        </div>
      </div>
    );
  }

  if (!currentUser) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
        <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
          <div className="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <Users size={40} className="text-white" />
          </div>
          <h1 className="text-3xl font-bold text-gray-800 mb-1">Flowdesk</h1>
          <p className="text-indigo-500 font-medium text-sm mb-1">Gestión de proyectos simple y colaborativa</p>
          <p className="text-gray-500 text-sm mb-8">Iniciá sesión para continuar</p>
          <button onClick={handleGoogleLogin} className="w-full py-3 px-6 bg-white border-2 border-gray-300 rounded-lg font-semibold text-gray-700 hover:bg-gray-50 hover:border-gray-400 transition-all flex items-center justify-center gap-3">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
            Continuar con Google
          </button>
        </div>
      </div>
    );
  }

  // ==================== ONBOARDING ====================
  if (showOnboarding) {
    return <OnboardingWizard onComplete={completeOnboarding} userRole={currentUser?.role} />;
  }

  const filteredProjects = getFilteredProjects();

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 pb-20">
      {confirmDialog && (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">

              <button onClick={() => setConfirmDialog(null)} className="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg font-medium">Cancelar</button>

      {saveError && (
        <div className="fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-lg shadow-lg z-50 text-sm font-medium">
          <AlertTriangle size={14} className="inline mr-1" /> {saveError}

      <div className="bg-white shadow-sm sticky top-0 z-10">
        <div className="max-w-4xl mx-auto px-4 py-4">

                                          <div className="flex gap-2">
                                            <button onClick={() => updateNotes(project.id, objective.id, sub.id, noteText)} className="flex-1 bg-yellow-600 text-white py-1 rounded text-xs"><Check size={12} className="inline mr-1" />Guardar</button>
                                            <button onClick={() => { setEditingNotes(null); setNoteText(''); }} className="flex-1 bg-gray-400 text-white py-1 rounded text-xs"><X size={12} className="inline mr-1" />Cancelar</button>
                                          </div>
                                        </div>
                                      )}
                                    </div>
                                    {effectiveViewMode === 'work' && (
                                      <div className="flex flex-col ml-2">
                                        <button onClick={() => moveTask(project.id, objective.id, sub.id, 'up')} disabled={objective.subObjectives.findIndex(s => s.id === sub.id) === 0} className="p-0.5 text-gray-400 hover:text-indigo-600 disabled:opacity-20">▲</button>
                                        <button onClick={() => moveTask(project.id, objective.id, sub.id, 'down')} disabled={objective.subObjectives.findIndex(s => s.id === sub.id) === objective.subObjectives.length - 1} className="p-0.5 text-gray-400 hover:text-indigo-600 disabled:opacity-20">▼</button>
                                      </div>
                                    )}
                                    {effectiveViewMode === 'work' && isProjectAdmin(project) && (
                                      <button onClick={() => handleDeleteItem(project.id, objective.id, sub.id)} className="p-1 text-red-500 ml-1"><Trash2 size={14} /></button>
                                    )}
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}

                          {effectiveViewMode === 'work' && addingSubObjectiveTo !== objective.id && (
                            <button onClick={() => setAddingSubObjectiveTo(objective.id)} className="mt-2 text-xs text-indigo-500 hover:text-indigo-700 py-1">
                              <Plus size={14} className="inline mr-1" />Agregar Tarea
                            </button>
                          )}

                          {addingSubObjectiveTo === objective.id && (
                            <div className="mt-2 bg-indigo-50 p-3 rounded">
                              <input type="text" value={newSubObjectiveName} onChange={e => setNewSubObjectiveName(e.target.value)} placeholder="Nombre de la tarea..." className="w-full p-2 border rounded mb-2 text-sm" autoFocus />
                              <div className="flex gap-2">
                                <button onClick={() => addSubObjective(project.id, objective.id, newSubObjectiveName)} className="flex-1 bg-indigo-600 text-white py-1 rounded text-sm"><Check size={14} className="inline mr-1" />Crear</button>
                                <button onClick={() => { setAddingSubObjectiveTo(null); setNewSubObjectiveName(''); }} className="flex-1 bg-gray-300 text-gray-700 py-1 rounded text-sm"><X size={14} className="inline mr-1" />Cancelar</button>
                              </div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                    );
                  })}

                  {effectiveViewMode === 'work' && addingObjectiveTo !== project.id && (
                    <button onClick={() => setAddingObjectiveTo(project.id)} className="w-full mt-2 py-2 border-2 border-dashed border-indigo-200 rounded-lg text-indigo-500 text-sm hover:bg-indigo-50">
                      <Plus size={16} className="inline mr-1" />Agregar Objetivo
                    </button>
                  )}

                  {addingObjectiveTo === project.id && (
                    <div className="mt-2 bg-indigo-50 p-3 rounded">
                      <input type="text" value={newObjectiveName} onChange={e => setNewObjectiveName(e.target.value)} placeholder="Nombre del objetivo..." className="w-full p-2 border rounded mb-2 text-sm" autoFocus />
                      <div className="flex gap-2">
                        <button onClick={() => addObjective(project.id, newObjectiveName)} className="flex-1 bg-indigo-600 text-white py-2 rounded text-sm"><Check size={14} className="inline mr-1" />Crear</button>
                        <button onClick={() => { setAddingObjectiveTo(null); setNewObjectiveName(''); }} className="flex-1 bg-gray-300 text-gray-700 py-2 rounded text-sm"><X size={14} className="inline mr-1" />Cancelar</button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}

        {filteredProjects.length === 0 && (
          <div className="text-center py-12">
            <p className="mb-4"><Clipboard size={48} className="text-gray-300 mx-auto" /></p>
            <p className="text-gray-500">{effectiveViewMode === 'client' ? 'No tenés proyectos asignados todavía' : 'No hay proyectos. ¡Creá el primero!'}</p>
          </div>
        )}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<ProjectManager />);
  </script>
</body>
</html>
